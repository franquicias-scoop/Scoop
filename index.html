<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Scoop Workspace</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">

<!-- Firebase COMPAT (non-module, works in all browsers) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
:root{--cream:#F7F0E8;--cream-dark:#EDE4D8;--red:#C8102E;--red-pale:#FDEDF0;--text:#2C1810;--text-mid:#6B4C3B;--text-light:#A08070;--white:#fff;--shadow:0 2px 16px rgba(44,24,16,.07);--shadow-lg:0 16px 56px rgba(44,24,16,.15);--r:14px;--rs:9px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh}
#loginScreen{position:fixed;inset:0;background:var(--cream);display:flex;align-items:center;justify-content:center;z-index:999}
.lbox{background:var(--white);border-radius:24px;padding:40px 36px;width:360px;max-width:92vw;box-shadow:var(--shadow-lg);text-align:center}
.llogo{font-family:'Playfair Display',serif;font-size:48px;color:var(--red);font-style:italic;margin-bottom:6px}
.lsub{font-size:11px;color:var(--text-light);letter-spacing:2px;text-transform:uppercase;margin-bottom:30px}
.llbl{font-size:10px;font-weight:700;color:var(--text-mid);letter-spacing:1px;text-transform:uppercase;text-align:left;display:block;margin-bottom:6px}
.linput{width:100%;padding:12px 16px;border:1.5px solid var(--cream-dark);border-radius:var(--rs);font-size:16px;font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);outline:none;text-align:center;letter-spacing:3px;margin-bottom:14px}
.linput:focus{border-color:var(--red);background:white}
.lbtn{width:100%;background:var(--red);color:white;border:none;padding:13px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif}
.lerr{font-size:12px;color:var(--red);margin-top:8px;display:none}
#loader{position:fixed;inset:0;background:var(--cream);display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px;z-index:998}
.lloogo{font-family:'Playfair Display',serif;font-size:44px;color:var(--red);font-style:italic}
.lbar{width:100px;height:3px;background:var(--cream-dark);border-radius:2px;overflow:hidden}
.lfill{height:100%;background:var(--red);border-radius:2px;animation:ld 1.5s ease forwards}
@keyframes ld{to{width:100%}}
#app{display:none}
.header{background:var(--white);border-bottom:1px solid var(--cream-dark);padding:0 20px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 1px 12px rgba(44,24,16,.06)}
.hlogo{font-family:'Playfair Display',serif;font-size:24px;color:var(--red);font-style:italic}
.ntabs{display:flex;gap:4px}
.ntab{padding:7px 14px;border-radius:50px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--text-light);font-family:'DM Sans',sans-serif}
.ntab.on{background:var(--red);color:white}
.hright{font-size:11px;color:var(--text-light);display:flex;align-items:center;gap:6px}
.sdot{width:7px;height:7px;border-radius:50%;background:#4CAF50;flex-shrink:0}
.sdot.sy{background:#FF9800;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.layout{display:flex;min-height:calc(100vh - 58px)}
.sidebar{width:220px;flex-shrink:0;background:var(--white);border-right:1px solid var(--cream-dark);padding:16px 0;overflow-y:auto}
.main{flex:1;padding:22px 24px;overflow-y:auto;min-width:0}
@media(max-width:768px){.sidebar{display:none}.main{padding:16px}}
.slbl{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-light);padding:10px 18px 4px}
.si{display:flex;align-items:center;gap:8px;padding:8px 18px;font-size:13px;font-weight:500;color:var(--text-mid);cursor:pointer;border-left:3px solid transparent}
.si:hover{background:var(--cream)}
.si.on{background:var(--red-pale);color:var(--red);font-weight:600;border-left-color:var(--red)}
.sbadge{margin-left:auto;font-size:10px;background:var(--cream-dark);padding:2px 7px;border-radius:20px;color:var(--text-mid);font-weight:600}
.sbadge.h{background:var(--red);color:white}
.sdivider{border:none;border-top:1px solid var(--cream-dark);margin:10px 0}
.view{display:none}.view.on{display:block}
.btn{border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;border-radius:50px;font-size:13px}
.bred{background:var(--red);color:white;padding:9px 18px}
.bghost{background:transparent;color:var(--text-mid);border:1.5px solid var(--cream-dark);padding:8px 14px}
.bsm{padding:5px 10px;font-size:11px}
.phead{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.ptitle{font-family:'Playfair Display',serif;font-size:28px}
.psub{font-size:13px;color:var(--text-light);margin-top:3px}
.stats{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.stat{background:var(--white);border-radius:var(--r);padding:14px 18px;box-shadow:var(--shadow);min-width:100px}
.statn{font-family:'Playfair Display',serif;font-size:28px;color:var(--red);line-height:1}
.statl{font-size:10px;color:var(--text-light);font-weight:500;text-transform:uppercase;letter-spacing:1px;margin-top:3px}
.fclist{display:flex;flex-direction:column;gap:12px}
.fc{background:var(--white);border-radius:var(--r);box-shadow:var(--shadow);border:1.5px solid transparent;overflow:hidden}
.fch{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;-webkit-user-select:none;user-select:none}
.fcav{width:38px;height:38px;border-radius:50%;background:var(--red);color:white;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:15px;font-weight:600;flex-shrink:0;pointer-events:none}
.fci{flex:1;min-width:0;pointer-events:none}
.fcn{font-weight:600;font-size:14px}
.fcc{font-size:12px;color:var(--text-light);margin-top:1px}
.fcr{display:flex;align-items:center;gap:8px;flex-shrink:0;pointer-events:none}
.spill{padding:4px 10px;border-radius:50px;font-size:10px;font-weight:700}
.sp0{background:#FFF3CD;color:#856404}.sp1{background:#FFE4B5;color:#7D5A00}.sp2{background:#D4EDDA;color:#155724}.sp3{background:#CCE5FF;color:#004085}.sp4{background:#D1ECF1;color:#0C5460}
.pwrap{display:flex;flex-direction:column;align-items:center;gap:2px}
.pbar{width:70px;height:4px;background:var(--cream-dark);border-radius:2px;overflow:hidden}
.pfill{height:100%;background:var(--red);border-radius:2px}
.ptxt{font-size:10px;color:var(--text-light);font-weight:500}
.chev{font-size:11px;color:var(--text-light);transition:transform .2s;flex-shrink:0}
.chev.op{transform:rotate(180deg)}
.fcd{display:none;border-top:1px solid var(--cream-dark)}
.fcd.op{display:block}
.pipebar{display:flex;background:var(--cream)}
.pstep{flex:1;padding:8px 4px;text-align:center;font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text-light);cursor:pointer;border-right:1px solid var(--cream-dark)}
.pstep:last-child{border-right:none}
.pstep.done{background:var(--red);color:white}
.pstep.cur{background:var(--red-pale);color:var(--red);box-shadow:inset 0 -3px 0 var(--red)}
.clgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;padding:16px}
.clsec{background:var(--cream);border-radius:var(--rs);overflow:hidden;border:1px solid var(--cream-dark)}
.clhd{padding:9px 12px;display:flex;justify-content:space-between;align-items:center;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:white}
.h0{background:#8B6F5E}.h1{background:#C8910E}.h2{background:#2D7A4A}.h3{background:#1A6BAA}.h4{background:#5A2D8A}
.cli{display:flex;align-items:flex-start;gap:8px;padding:8px 12px;border-bottom:1px solid var(--cream-dark);background:white}
.cli:last-child{border-bottom:none}
.chk{width:16px;height:16px;border:2px solid var(--cream-dark);border-radius:4px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;margin-top:1px;-webkit-user-select:none;user-select:none}
.chk.on{background:var(--red);border-color:var(--red);color:white}
.clbl{flex:1;font-size:12px;line-height:1.4}
.clbl.done{text-decoration:line-through;color:var(--text-light)}
.folrow{display:flex;align-items:center;gap:4px;margin-top:4px}
.follbl{font-size:9px;color:var(--text-light);font-weight:600;text-transform:uppercase}
.folin{font-size:11px;padding:2px 6px;border:1px solid var(--cream-dark);border-radius:4px;background:var(--cream);color:var(--text-mid);width:95px;outline:none;font-family:'DM Sans',sans-serif}
.fcnotes{padding:12px 16px;border-top:1px solid var(--cream-dark);background:white;display:flex;gap:8px;align-items:flex-start}
.nta{flex:1;padding:8px 11px;border:1.5px solid var(--cream-dark);border-radius:var(--rs);font-size:12px;font-family:'DM Sans',sans-serif;resize:none;height:56px;outline:none;color:var(--text)}
.periodtabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.ptab{padding:6px 14px;border-radius:50px;font-size:12px;font-weight:600;border:1.5px solid var(--cream-dark);background:white;color:var(--text-mid);cursor:pointer;font-family:'DM Sans',sans-serif}
.ptab.on{background:var(--red);border-color:var(--red);color:white}
.mboard{display:flex;flex-direction:column;gap:12px}
.mgrp{background:white;border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;border:1.5px solid var(--cream-dark)}
.mghd{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;border-bottom:1px solid var(--cream-dark);background:var(--cream);-webkit-user-select:none;user-select:none}
.mgtitle{font-weight:700;font-size:14px;flex:1;pointer-events:none}
.mgmeta{display:flex;align-items:center;gap:8px;pointer-events:none}
.mcat{padding:3px 9px;border-radius:50px;font-size:10px;font-weight:700}
.credes{background:#FFE4F0;color:#9B1B5A}.cvideo{background:#E4F0FF;color:#1B5A9B}.cdiseno{background:#FFF4E4;color:#9B6A1B}.ccampana{background:#E4FFE9;color:#1B7A2A}.cgeneral{background:var(--cream-dark);color:var(--text-mid)}
.mpb{width:50px;height:4px;background:var(--cream-dark);border-radius:2px;overflow:hidden;display:inline-block}
.mpbf{height:100%;background:var(--red)}
.mptxt{font-size:10px;color:var(--text-light);font-weight:500}
.mgchev{color:var(--text-light);font-size:11px;transition:transform .2s;pointer-events:none}
.mgchev.op{transform:rotate(180deg)}
.mtasks{display:none}.mtasks.op{display:block}
.mtask{display:flex;align-items:flex-start;gap:9px;padding:10px 16px;border-bottom:1px solid var(--cream)}
.mtask:last-child{border-bottom:none}
.mtbody{flex:1}
.mttxt{font-size:13px;line-height:1.45}
.mttxt.done{text-decoration:line-through;color:var(--text-light)}
.mtmeta{display:flex;gap:7px;align-items:center;margin-top:4px;flex-wrap:wrap}
.ac{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px}
.acor{background:#F0E8FF;color:#5A2D8A}.aale{background:#E4F0FF;color:#1B5A9B}.aana{background:#FFE4F0;color:#9B1B5A}.aambas{background:#E4FFE9;color:#1B7A2A}
.pdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px}
.palta{background:var(--red)}.pmedia{background:#FF9800}.pbaja{background:#4CAF50}
.tdate{font-size:10px;color:var(--text-light);background:var(--cream);border-radius:20px;padding:2px 7px;border:1px solid var(--cream-dark)}
.refs{padding:8px 16px;display:flex;flex-wrap:wrap;gap:6px;border-bottom:1px solid var(--cream)}
.refitem{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:500;background:var(--cream);border:1px solid var(--cream-dark);color:var(--text-mid);text-decoration:none;cursor:pointer;max-width:220px;overflow:hidden}
.refitem:hover{border-color:var(--red);color:var(--red)}
.refdel{margin-left:4px;font-size:10px;cursor:pointer;opacity:.5;flex-shrink:0;border:none;background:none;color:inherit}
.refadd{display:flex;gap:6px;padding:6px 16px 8px;flex-wrap:wrap;background:var(--cream);border-bottom:1px solid var(--cream-dark)}
.refin{flex:1;min-width:180px;padding:6px 10px;border:1.5px solid var(--cream-dark);border-radius:var(--rs);font-size:12px;font-family:'DM Sans',sans-serif;background:white;outline:none;color:var(--text)}
.refin:focus{border-color:var(--red)}
.madd{display:flex;gap:7px;padding:9px 16px;background:var(--cream);border-top:1px solid var(--cream-dark);flex-wrap:wrap}
.maddin{flex:1;min-width:160px;padding:7px 11px;border:1.5px solid var(--cream-dark);border-radius:var(--rs);font-size:13px;font-family:'DM Sans',sans-serif;background:white;outline:none;color:var(--text)}
.maddsel{padding:7px 8px;border:1.5px solid var(--cream-dark);border-radius:var(--rs);font-size:11px;font-family:'DM Sans',sans-serif;background:white;color:var(--text-mid);cursor:pointer;outline:none}
.overlay{display:none;position:fixed;inset:0;background:rgba(44,24,16,.45);z-index:300;align-items:center;justify-content:center}
.overlay.on{display:flex}
.modal{background:white;border-radius:18px;padding:26px;width:460px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.mtitle{font-family:'Playfair Display',serif;font-size:22px;margin-bottom:5px}
.msub{font-size:13px;color:var(--text-light);margin-bottom:20px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:11px}
.frow.full{grid-template-columns:1fr}
.fg{display:flex;flex-direction:column;gap:4px}
.fl{font-size:10px;font-weight:700;color:var(--text-mid);letter-spacing:1px;text-transform:uppercase}
.fi{padding:9px 11px;border:1.5px solid var(--cream-dark);border-radius:var(--rs);font-size:13px;font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);outline:none;width:100%}
.fi:focus{border-color:var(--red);background:white}
.mfoot{display:flex;gap:9px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--cream-dark)}
.toolbar{display:flex;gap:10px;margin-bottom:16px}
.srch{position:relative}
.srch input{padding:8px 13px 8px 34px;border:1.5px solid var(--cream-dark);border-radius:50px;font-size:13px;font-family:'DM Sans',sans-serif;background:white;color:var(--text);outline:none;width:240px}
.srch-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--text-light);pointer-events:none}
.empty{text-align:center;padding:48px 20px}
.empty-icon{font-size:40px;opacity:.4;margin-bottom:12px}
.empty-t{font-family:'Playfair Display',serif;font-size:20px;color:var(--text-mid)}
.empty-s{font-size:13px;color:var(--text-light);margin-top:6px}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--cream)}::-webkit-scrollbar-thumb{background:var(--cream-dark);border-radius:3px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="lbox">
    <div class="llogo">Scoop</div>
    <div class="lsub">Workspace Interno</div>
    <label class="llbl">Contraseña</label>
    <input class="linput" type="password" id="pwInput" placeholder="••••••••••">
    <button class="lbtn" id="loginBtn">Entrar</button>
    <div class="lerr" id="loginErr">Contraseña incorrecta.</div>
  </div>
</div>

<!-- LOADER -->
<div id="loader">
  <div class="lloogo">Scoop</div>
  <div style="font-size:11px;color:var(--text-light);letter-spacing:2px;text-transform:uppercase">Cargando...</div>
  <div class="lbar"><div class="lfill"></div></div>
</div>

<!-- APP -->
<div id="app">
  <div class="header">
    <div class="hlogo">Scoop</div>
    <div class="ntabs" id="ntabs"></div>
    <div class="hright"><div class="sdot" id="sdot"></div><span id="slbl">Conectando...</span></div>
  </div>
  <div class="layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="main">
      <div class="view" id="vfc">
        <div class="phead">
          <div><div class="ptitle">Franquicias</div><div class="psub">Pipeline y seguimiento</div></div>
          <button class="btn bred" id="btnFC">+ Nuevo Prospecto</button>
        </div>
        <div class="stats" id="fcstats"></div>
        <div class="toolbar"><div class="srch"><span class="srch-icon">🔍</span><input type="text" id="fcsrch" placeholder="Buscar..."></div></div>
        <div class="fclist" id="fclist"></div>
      </div>
      <div class="view" id="vmkt">
        <div class="phead">
          <div><div class="ptitle">Marketing & Contenido</div><div class="psub">Pendientes por periodo</div></div>
          <button class="btn bred" id="btnMkt">+ Nueva Tarea</button>
        </div>
        <div class="periodtabs" id="ptabs"></div>
        <div class="mboard" id="mboard"></div>
      </div>
    </div>
  </div>
</div>

<!-- FC MODAL -->
<div class="overlay" id="fcModal">
  <div class="modal">
    <div class="mtitle">Nuevo Prospecto</div>
    <div class="msub">Agrega un prospecto al pipeline</div>
    <div class="frow"><div class="fg"><label class="fl">Nombre</label><input class="fi" id="mfcName" placeholder="Ej. Carlos Mendoza"></div><div class="fg"><label class="fl">Ciudad</label><select class="fi" id="mfcCity"></select></div></div>
    <div class="frow"><div class="fg"><label class="fl">Teléfono</label><input class="fi" id="mfcPhone" placeholder="+52 81 ..."></div><div class="fg"><label class="fl">Email</label><input class="fi" id="mfcEmail" type="email" placeholder="correo@..."></div></div>
    <div class="frow"><div class="fg"><label class="fl">Etapa</label><select class="fi" id="mfcStage"><option>Prospecto</option><option>Negociación</option><option>Firma</option><option>Pre-Apertura</option><option>Abierta</option></select></div><div class="fg"><label class="fl">Fecha</label><input class="fi" id="mfcDate" type="date"></div></div>
    <div class="mfoot"><button class="btn bghost" id="cancelFC">Cancelar</button><button class="btn bred" id="okFC">Agregar</button></div>
  </div>
</div>

<!-- MKT MODAL -->
<div class="overlay" id="mktModal">
  <div class="modal">
    <div class="mtitle">Nueva Tarea</div>
    <div class="msub">Agrega una tarea de marketing</div>
    <div class="frow full"><div class="fg"><label class="fl">Descripción</label><input class="fi" id="mmText" placeholder="Ej. Diseñar flyer apertura GDL"></div></div>
    <div class="frow"><div class="fg"><label class="fl">Periodo</label><input class="fi" id="mmPeriod" placeholder="Ej. ABRIL - JUNIO"></div><div class="fg"><label class="fl">Grupo / Campaña</label><input class="fi" id="mmGroup" placeholder="Ej. Apertura GDL"></div></div>
    <div class="frow"><div class="fg"><label class="fl">Categoría</label><select class="fi" id="mmCat"><option value="redes">📱 Redes Sociales</option><option value="video">🎬 Video</option><option value="diseno">🎨 Diseño</option><option value="campana">📣 Campaña</option><option value="general">📋 General</option></select></div><div class="fg"><label class="fl">Asignado a</label><select class="fi" id="mmAssign"><option value="ale">Ale</option><option value="cor">Cordelia</option><option value="ana">Ana</option><option value="ambas">Todas</option></select></div></div>
    <div class="frow"><div class="fg"><label class="fl">Prioridad</label><select class="fi" id="mmPrio"><option value="alta">🔴 Alta</option><option value="media">🟡 Media</option><option value="baja">🟢 Baja</option></select></div><div class="fg"><label class="fl">Fecha límite</label><input class="fi" id="mmDue" type="date"></div></div>
    <div class="mfoot"><button class="btn bghost" id="cancelMkt">Cancelar</button><button class="btn bred" id="okMkt">Agregar</button></div>
  </div>
</div>

<script>
// ── FIREBASE INIT (compat SDK - works in all browsers) ──
firebase.initializeApp({
  apiKey:"AIzaSyCxjl39lsYyQMVNPPjdPn1dIr5uv47YjsU",
  authDomain:"scoop-frozen-yogurt.firebaseapp.com",
  projectId:"scoop-frozen-yogurt",
  storageBucket:"scoop-frozen-yogurt.firebasestorage.app",
  messagingSenderId:"880756018979",
  appId:"1:880756018979:web:e2536756a63f1b7ee18696"
});
var db = firebase.firestore();
var FC  = db.collection('ws').doc('franchises');
var MKT = db.collection('ws').doc('marketing');
var CTY = db.collection('ws').doc('cities');

// ── CONSTANTS ──

// ── HELPERS ──
function el(id){ return document.getElementById(id); }
function fmtDate(d){ if(!d)return''; var p=d.split('-'); var m=['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic']; return parseInt(p[2])+' '+m[+p[1]]; }
function catEmoji(c){ return {redes:'📱',video:'🎬',diseno:'🎨',campana:'📣',general:'📋'}[c]||'📋'; }
function assignLabel(a){ return {cor:'👩‍💼 Cordelia',ale:'👩‍💼 Ale',ana:'👩 Ana',ambas:'👯 Todas'}[a]||a; }
function assignCls(a){ return {cor:'acor',ale:'aale',ana:'aana',ambas:'aambas'}[a]||'aambas'; }
function prog(f){ var t=0,d=0; STAGES.forEach(function(s){ CL[s].forEach(function(i){ t++; if(f.checks&&f.checks[i.id])d++; }); }); return {t:t,d:d,p:t?Math.round(d/t*100):0}; }
function setSyncing(){ el('sdot').className='sdot sy'; el('slbl').textContent='Guardando...'; }
function setSynced(){ el('sdot').className='sdot'; el('slbl').textContent='Sincronizado ✓'; }
function updateCityDrop(){ var s=el('mfcCity'); if(s) s.innerHTML=cities.map(function(c){return '<option>'+c+'</option>';}).join(''); }

  var pw = el('pwInput').value.trim();

    sessionStorage.setItem('scoop_role','owner');
    role = 'owner';
    startApp();
  } else if(pw === 'scoop2026'){

// ── TABS ──
function buildTabs(){
  var tabs=el('ntabs');
  if(role==='owner'){
    tabs.innerHTML='<button class="ntab on" data-tab="fc">🏪 Franquicias</button><button class="ntab" data-tab="mkt">🎨 Marketing</button>';
  } else {
    tabs.innerHTML='<button class="ntab on" data-tab="mkt">🎨 Marketing</button>';
  }
  tabs.querySelectorAll('.ntab').forEach(function(btn){
    btn.addEventListener('click',function(){ showTab(btn.dataset.tab); });
  });
}

function showTab(tab){
  currentTab=tab;
  document.querySelectorAll('.ntab').forEach(function(b){ b.classList.toggle('on',b.dataset.tab===tab); });
  el('vfc').classList.toggle('on',tab==='fc');
  el('vmkt').classList.toggle('on',tab==='mkt');
  renderSidebar();
}

// ── SIDEBAR ──
function renderSidebar(){
  var sb=el('sidebar');
  if(currentTab==='fc'){
    var cnt={}; STAGES.forEach(function(s){cnt[s]=0;}); franchises.forEach(function(f){if(cnt[f.stage]!==undefined)cnt[f.stage]++;});
    var h='<div class="slbl">Etapas</div><div class="si'+(fcFilter==='all'?' on':'')+'" id="sfall">🗂 Todos <span class="sbadge'+(franchises.length?' h':'')+'">'+franchises.length+'</span></div>';
    STAGES.forEach(function(s,i){ h+='<div class="si'+(fcFilter===s?' on':'')+'" id="sfs'+i+'">'+STAGE_EMOJI[s]+' '+s+' <span class="sbadge'+(cnt[s]?' h':'')+'">'+cnt[s]+'</span></div>'; });
    h+='<div class="sdivider"></div><div class="slbl">Ciudad</div>';
    cities.forEach(function(c,i){ h+='<div class="si" id="sfc'+i+'">📍 '+c+'</div>'; });
    h+='<div class="si" id="sfcadd" style="color:var(--red);font-weight:600">+ Ciudad</div>';
    sb.innerHTML=h;
    el('sfall').addEventListener('click',function(){fcFilter='all';fcSearch='';el('fcsrch').value='';renderSidebar();renderFC();});
    STAGES.forEach(function(s,i){ var e2=el('sfs'+i); if(e2)e2.addEventListener('click',function(){fcFilter=s;fcSearch='';el('fcsrch').value='';renderSidebar();renderFC();}); });
    cities.forEach(function(c,i){ var e2=el('sfc'+i); if(e2)e2.addEventListener('click',function(){fcSearch=c;fcFilter='all';renderFC();}); });
    el('sfcadd').addEventListener('click',function(){
      var n=prompt('Nombre de la nueva ciudad:');
      if(!n||!n.trim())return;
      if(cities.indexOf(n.trim())<0){cities.push(n.trim());saveCTY();renderSidebar();updateCityDrop();}
      else alert('Ya existe.');
    });
  } else {
    var h2='<div class="slbl">Periodos</div>';
    mktData.periods.forEach(function(p,i){ h2+='<div class="si'+(mktPeriod===p?' on':'')+'" id="mp'+i+'">📅 '+p+'</div>'; });
    h2+='<div class="si" id="mpadd">+ Periodo</div><div class="sdivider"></div><div class="slbl">Categorías</div>';
    ['redes','video','diseno','campana','general'].forEach(function(c,i){ h2+='<div class="si" id="mc'+i+'">'+catEmoji(c)+' '+c.charAt(0).toUpperCase()+c.slice(1)+'</div>'; });
    sb.innerHTML=h2;
    mktData.periods.forEach(function(p,i){ var e2=el('mp'+i); if(e2)e2.addEventListener('click',function(){mktPeriod=p;renderSidebar();renderMkt();}); });
    el('mpadd').addEventListener('click',function(){
      var n=prompt('Nombre del periodo:');
      if(!n||!n.trim())return;
      if(mktData.periods.indexOf(n.trim())<0)mktData.periods.push(n.trim());
      mktPeriod=n.trim();renderMkt();renderSidebar();saveMKT();
    });
  }
}

// ── RENDER FC ──
function renderFC(){
  var cnt={}; STAGES.forEach(function(s){cnt[s]=0;}); franchises.forEach(function(f){if(cnt[f.stage]!==undefined)cnt[f.stage]++;});
  el('fcstats').innerHTML='<div class="stat"><div class="statn">'+franchises.length+'</div><div class="statl">Total</div></div>'+STAGES.map(function(s){return '<div class="stat"><div class="statn">'+cnt[s]+'</div><div class="statl">'+s+'</div></div>';}).join('');

  var list=franchises.filter(function(f){
    if(fcFilter!=='all'&&f.stage!==fcFilter)return false;
    if(fcSearch&&f.name.toLowerCase().indexOf(fcSearch.toLowerCase())<0&&f.city.toLowerCase().indexOf(fcSearch.toLowerCase())<0)return false;
    return true;
  });

  var container=el('fclist');
  if(!list.length){container.innerHTML='<div class="empty"><div class="empty-icon">🍦</div><div class="empty-t">Sin prospectos</div><div class="empty-s">Agrega uno arriba</div></div>';return;}

  container.innerHTML='';

  list.forEach(function(f){
    var pr=prog(f);
    var ini=f.name.split(' ').map(function(w){return w[0];}).join('').substring(0,2).toUpperCase();
    var si=STAGES.indexOf(f.stage);
    var isOpen=!!openFC[f.id];

    var div=document.createElement('div');
    div.className='fc';
    div.id='fc-'+f.id;

    // Build HTML
    var html='<div class="fch" id="fch-'+f.id+'">';
    html+='<div class="fcav">'+ini+'</div>';
    html+='<div class="fci"><div class="fcn">'+f.name+'</div><div class="fcc">📍 '+f.city+(f.phone?' · '+f.phone:'')+'</div></div>';
    html+='<div class="fcr"><div class="pwrap"><div class="pbar"><div class="pfill" style="width:'+pr.p+'%"></div></div><div class="ptxt">'+pr.d+'/'+pr.t+'</div></div>';
    html+='<span class="spill '+PILL_CLS[si]+'">'+f.stage+'</span>';
    html+='<span class="chev'+(isOpen?' op':'')+'">▼</span></div></div>';

    html+='<div class="fcd'+(isOpen?' op':'')+'" id="fcd-'+f.id+'">';
    html+='<div class="pipebar">';
    STAGES.forEach(function(s,i){
      var cls=i<si?'done':i===si?'cur':'';
      html+='<div class="pstep '+cls+'" id="ps-'+f.id+'-'+i+'">'+s+'</div>';
    });
    html+='</div><div class="clgrid">';
    STAGES.forEach(function(stage,si2){
      var items=CL[stage];
      var d=items.filter(function(i){return f.checks&&f.checks[i.id];}).length;
      html+='<div class="clsec"><div class="clhd '+HEAD_CLS[si2]+'">'+stage+'<span>'+d+'/'+items.length+'</span></div>';
      items.forEach(function(item){
        var on=!!(f.checks&&f.checks[item.id]);
        var fv=item.folio?(f.folios&&f.folios[item.folio]||''):'';
        html+='<div class="cli"><div class="chk'+(on?' on':'')+'" id="ck-'+f.id+'-'+item.id+'">'+(on?'✓':'')+'</div>';
        html+='<div style="flex:1"><div class="clbl'+(on?' done':'')+'">'+item.lbl+'</div>';
        if(item.folio)html+='<div class="folrow"><span class="follbl">Folio:</span><input class="folin" id="fl-'+f.id+'-'+item.folio+'" value="'+fv+'" placeholder="—"></div>';
        html+='</div></div>';
      });
      html+='</div>';
    });
    html+='</div>';
    html+='<div class="fcnotes"><textarea class="nta" id="nt-'+f.id+'" placeholder="Notas internas...">'+( f.notes||'')+'</textarea><button class="btn bghost bsm" id="dl-'+f.id+'">🗑</button></div>';
    html+='</div>';

    div.innerHTML=html;
    container.appendChild(div);

    // ── EVENTS ──
    // Toggle open/close
    var head=el('fch-'+f.id);
    head.addEventListener('click',function(e){
      if(e.target.classList.contains('pstep')||e.target.classList.contains('chk')||e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='BUTTON')return;
      openFC[f.id]=!openFC[f.id];
      var detail=el('fcd-'+f.id);
      var chev=head.querySelector('.chev');
      if(openFC[f.id]){detail.classList.add('op');if(chev)chev.classList.add('op');}
      else{detail.classList.remove('op');if(chev)chev.classList.remove('op');}
    });

    // Pipeline steps
    STAGES.forEach(function(s,i){
      var ps=el('ps-'+f.id+'-'+i);
      if(!ps)return;
      ps.addEventListener('click',function(e){
        e.stopPropagation();
        var fc=franchises.find(function(x){return x.id===f.id;});
        if(!fc)return;
        fc.stage=s;
        openFC[f.id]=true;
        renderFC();
        saveFC();
      });
    });

    // Checkboxes
    STAGES.forEach(function(stage){
      CL[stage].forEach(function(item){
        var ck=el('ck-'+f.id+'-'+item.id);
        if(!ck)return;
        ck.addEventListener('click',function(e){
          e.stopPropagation();
          var fc=franchises.find(function(x){return x.id===f.id;});
          if(!fc)return;
          if(!fc.checks)fc.checks={};
          fc.checks[item.id]=!fc.checks[item.id];
          openFC[f.id]=true;
          renderFC();
          saveFC();
        });
        // Folio
        if(item.folio){
          var flin=el('fl-'+f.id+'-'+item.folio);
          if(flin){
            flin.addEventListener('click',function(e){e.stopPropagation();});
            flin.addEventListener('change',function(e){
              e.stopPropagation();
              var fc=franchises.find(function(x){return x.id===f.id;});
              if(!fc)return;
              if(!fc.folios)fc.folios={};
              fc.folios[item.folio]=flin.value;
              saveFC();
            });
          }
        }
      });
    });

    // Notes
    var nta=el('nt-'+f.id);
    if(nta){
      nta.addEventListener('click',function(e){e.stopPropagation();});
      nta.addEventListener('change',function(e){
        e.stopPropagation();
        var fc=franchises.find(function(x){return x.id===f.id;});
        if(fc){fc.notes=nta.value;saveFC();}
      });
    }

    // Delete
    var dlbtn=el('dl-'+f.id);
    if(dlbtn){
      dlbtn.addEventListener('click',function(e){
        e.stopPropagation();
        if(!confirm('¿Eliminar este prospecto?'))return;
        franchises=franchises.filter(function(x){return x.id!==f.id;});
        delete openFC[f.id];
        renderFC();renderSidebar();saveFC();
      });
    }
  });
}

// ── RENDER MKT ──
function renderMkt(){
  var ptabsEl=el('ptabs');
  ptabsEl.innerHTML=mktData.periods.map(function(p,i){return '<div class="ptab'+(mktPeriod===p?' on':'')+'" id="pt'+i+'">'+p+'</div>';}).join('')+'<div class="ptab" id="ptadd">+ Periodo</div>';
  mktData.periods.forEach(function(p,i){ var e2=el('pt'+i); if(e2)e2.addEventListener('click',function(){mktPeriod=p;renderSidebar();renderMkt();}); });
  el('ptadd').addEventListener('click',function(){
    var n=prompt('Nombre del periodo:');
    if(!n||!n.trim())return;
    if(mktData.periods.indexOf(n.trim())<0)mktData.periods.push(n.trim());
    mktPeriod=n.trim();renderMkt();renderSidebar();saveMKT();
  });

  var groups=mktData.groups.filter(function(gr){return gr.period===mktPeriod;});
  var bd=el('mboard');
  if(!groups.length){bd.innerHTML='<div class="empty"><div class="empty-icon">🎨</div><div class="empty-t">Sin tareas</div><div class="empty-s">Agrega una nueva tarea arriba</div></div>';return;}

  bd.innerHTML='';

  groups.forEach(function(gr){
    var d=gr.tasks.filter(function(t){return t.done;}).length;
    var t=gr.tasks.length;
    var p=t?Math.round(d/t*100):0;
    var isOpen=!!openMG[gr.id];
    var refs=gr.refs||[];

    var div=document.createElement('div');
    div.className='mgrp';

    var html='<div class="mghd" id="mgh-'+gr.id+'">';
    html+='<span style="font-size:18px;pointer-events:none">'+(gr.emoji||'📋')+'</span>';
    html+='<span class="mgtitle">'+gr.title+'</span>';
    html+='<div class="mgmeta"><span class="mcat c'+gr.cat+'">'+catEmoji(gr.cat)+' '+gr.cat+'</span>';
    html+='<div style="display:flex;align-items:center;gap:5px"><div class="mpb"><div class="mpbf" style="width:'+p+'%"></div></div><span class="mptxt">'+d+'/'+t+'</span></div></div>';
    html+='<span class="mgchev'+(isOpen?' op':'')+'">▼</span></div>';

    html+='<div class="mtasks'+(isOpen?' op':'')+'" id="mgt-'+gr.id+'">';

    // Refs
    if(refs.length){
      html+='<div class="refs">';
      refs.forEach(function(ref,ri){
        var icon=ref.type==='pdf'?'📄':ref.type==='video'?'🎬':ref.type==='img'?'🖼':'🔗';
        html+='<a class="refitem" href="'+ref.url+'" target="_blank">'+icon+' '+(ref.name||ref.url.substring(0,25)+'...')+'<button class="refdel" id="rd-'+gr.id+'-'+ri+'">✕</button></a>';
      });
      html+='</div>';
    }

    html+='<div class="refadd"><input class="refin" id="ri-'+gr.id+'" placeholder="🔗 Pega un link, URL de imagen o PDF..."><input class="refin" id="rn-'+gr.id+'" placeholder="Nombre (opcional)" style="max-width:150px"><button class="btn bred bsm" id="rb-'+gr.id+'">+ Link</button></div>';

    gr.tasks.forEach(function(tk){
      html+='<div class="mtask">';
      html+='<div class="pdot p'+(tk.prio||'media')+'"></div>';
      html+='<div class="chk'+(tk.done?' on':'')+'" id="mc-'+gr.id+'-'+tk.id+'">'+(tk.done?'✓':'')+'</div>';
      html+='<div class="mtbody"><div class="mttxt'+(tk.done?' done':'')+'">'+tk.txt+'</div>';
      html+='<div class="mtmeta">'+(tk.assign?'<span class="ac '+assignCls(tk.assign)+'">'+assignLabel(tk.assign)+'</span>':'')+(tk.due?'<span class="tdate">📅 '+fmtDate(tk.due)+'</span>':'')+'</div></div>';
      html+='<button class="btn bghost bsm" id="td-'+gr.id+'-'+tk.id+'">🗑</button></div>';
    });

    html+='<div class="madd"><input class="maddin" id="qa-'+gr.id+'" placeholder="+ Agregar tarea rápida..."><select class="maddsel" id="qs-'+gr.id+'"><option value="ale">Ale</option><option value="cor">Cordelia</option><option value="ana">Ana</option><option value="ambas">Todas</option></select><button class="btn bred bsm" id="qb-'+gr.id+'">+</button></div>';
    html+='</div>';

    div.innerHTML=html;
    bd.appendChild(div);

    // Events
    var mgh=el('mgh-'+gr.id);
    if(mgh) mgh.addEventListener('click',function(e){
      if(e.target.tagName==='BUTTON'||e.target.tagName==='INPUT'||e.target.tagName==='A')return;
      openMG[gr.id]=!openMG[gr.id];
      var mgt=el('mgt-'+gr.id);
      var mgchev=mgh.querySelector('.mgchev');
      if(openMG[gr.id]){mgt.classList.add('op');if(mgchev)mgchev.classList.add('op');}
      else{mgt.classList.remove('op');if(mgchev)mgchev.classList.remove('op');}
    });

    // Task checkboxes
    gr.tasks.forEach(function(tk){
      var ck=el('mc-'+gr.id+'-'+tk.id);
      if(ck) ck.addEventListener('click',function(e){
        e.stopPropagation();
        var gd=mktData.groups.find(function(x){return x.id===gr.id;});
        var td=gd&&gd.tasks.find(function(x){return x.id===tk.id;});
        if(td){td.done=!td.done;openMG[gr.id]=true;renderMkt();saveMKT();}
      });
      var tdb=el('td-'+gr.id+'-'+tk.id);
      if(tdb) tdb.addEventListener('click',function(e){
        e.stopPropagation();
        var gd=mktData.groups.find(function(x){return x.id===gr.id;});
        if(gd){gd.tasks=gd.tasks.filter(function(x){return x.id!==tk.id;});openMG[gr.id]=true;renderMkt();saveMKT();}
      });
    });

    // Ref delete
    refs.forEach(function(ref,ri){
      var rd=el('rd-'+gr.id+'-'+ri);
      if(rd) rd.addEventListener('click',function(e){
        e.preventDefault();e.stopPropagation();
        var gd=mktData.groups.find(function(x){return x.id===gr.id;});
        if(gd){gd.refs.splice(ri,1);openMG[gr.id]=true;renderMkt();saveMKT();}
      });
    });

    // Add ref
    var rb=el('rb-'+gr.id);
    if(rb) rb.addEventListener('click',function(e){
      e.stopPropagation();
      var url=(el('ri-'+gr.id)||{}).value&&el('ri-'+gr.id).value.trim();
      var name=(el('rn-'+gr.id)||{}).value&&el('rn-'+gr.id).value.trim()||'';
      if(!url)return;
      var type='link';
      if(/\.(pdf)$/i.test(url))type='pdf';
      else if(/\.(mp4|mov|avi|webm)$/i.test(url)||url.indexOf('youtube')>-1||url.indexOf('vimeo')>-1)type='video';
      else if(/\.(jpg|jpeg|png|gif|webp|heic)$/i.test(url)||url.indexOf('drive.google')>-1||url.indexOf('dropbox')>-1)type='img';
      var gd=mktData.groups.find(function(x){return x.id===gr.id;});
      if(!gd)return;
      if(!gd.refs)gd.refs=[];
      gd.refs.push({url:url,name:name,type:type});
      el('ri-'+gr.id).value='';
      el('rn-'+gr.id).value='';
      openMG[gr.id]=true;
      renderMkt();saveMKT();
    });
    var riEl=el('ri-'+gr.id);
    if(riEl) riEl.addEventListener('keydown',function(e){ if(e.key==='Enter'){e.stopPropagation();el('rb-'+gr.id).click();} });
    riEl&&riEl.addEventListener('click',function(e){e.stopPropagation();});

    // Quick add
    var qb=el('qb-'+gr.id);
    if(qb) qb.addEventListener('click',function(e){
      e.stopPropagation();
      var qa=el('qa-'+gr.id),qs=el('qs-'+gr.id);
      if(!qa||!qa.value.trim())return;
      var gd=mktData.groups.find(function(x){return x.id===gr.id;});
      if(!gd)return;
      gd.tasks.push({id:'t'+Date.now(),txt:qa.value.trim(),done:false,assign:qs?qs.value:'ale',prio:'media',due:'',sub:false});
      qa.value='';openMG[gr.id]=true;renderMkt();saveMKT();
    });
    var qaEl=el('qa-'+gr.id);
    if(qaEl){
      qaEl.addEventListener('keydown',function(e){if(e.key==='Enter'){e.stopPropagation();el('qb-'+gr.id).click();}});
      qaEl.addEventListener('click',function(e){e.stopPropagation();});
    }
  });
}

// ── MODALS ──
el('btnFC').addEventListener('click',function(){ el('mfcDate').value=new Date().toISOString().split('T')[0]; updateCityDrop(); el('fcModal').classList.add('on'); });
el('cancelFC').addEventListener('click',function(){ el('fcModal').classList.remove('on'); });
el('fcModal').addEventListener('click',function(e){ if(e.target===el('fcModal'))el('fcModal').classList.remove('on'); });
el('okFC').addEventListener('click',function(){
  var name=el('mfcName').value.trim();
  if(!name){alert('Ingresa el nombre.');return;}
  franchises.unshift({id:'fc'+Date.now(),name:name,city:el('mfcCity').value,phone:el('mfcPhone').value,email:el('mfcEmail').value,stage:el('mfcStage').value,date:el('mfcDate').value,notes:'',checks:{},folios:{}});
  el('mfcName').value='';el('mfcPhone').value='';el('mfcEmail').value='';
  el('fcModal').classList.remove('on');
  renderFC();renderSidebar();saveFC();
});

el('btnMkt').addEventListener('click',function(){ el('mmPeriod').value=mktPeriod; el('mktModal').classList.add('on'); });
el('cancelMkt').addEventListener('click',function(){ el('mktModal').classList.remove('on'); });
el('mktModal').addEventListener('click',function(e){ if(e.target===el('mktModal'))el('mktModal').classList.remove('on'); });
el('okMkt').addEventListener('click',function(){
  var txt=el('mmText').value.trim(),period=el('mmPeriod').value.trim(),grpTitle=el('mmGroup').value.trim();
  if(!txt||!period||!grpTitle){alert('Completa todos los campos.');return;}
  if(mktData.periods.indexOf(period)<0)mktData.periods.push(period);
  var grp=mktData.groups.find(function(x){return x.period===period&&x.title===grpTitle;});
  if(!grp){grp={id:'g'+Date.now(),period:period,title:grpTitle,emoji:'📋',cat:el('mmCat').value,tasks:[],refs:[]};mktData.groups.push(grp);}
  grp.tasks.push({id:'t'+Date.now(),txt:el('mmText').value.trim(),done:false,assign:el('mmAssign').value,prio:el('mmPrio').value,due:el('mmDue').value,sub:false});
  mktPeriod=period;openMG[grp.id]=true;
  el('mmText').value='';el('mmGroup').value='';
  el('mktModal').classList.remove('on');
  renderMkt();renderSidebar();saveMKT();
});

el('fcsrch').addEventListener('input',function(){ fcSearch=this.value; renderFC(); });
</script>

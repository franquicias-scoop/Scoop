<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Scoop Workspace</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root{--cream:#F7F0E8;--cream-dark:#EDE4D8;--red:#C8102E;--red-light:#E8304A;--red-pale:#FDEDF0;--text:#2C1810;--text-mid:#6B4C3B;--text-light:#A08070;--white:#FFFFFF;--shadow:0 2px 16px rgba(44,24,16,0.07);--shadow-md:0 6px 28px rgba(44,24,16,0.11);--shadow-lg:0 16px 56px rgba(44,24,16,0.15);--r:14px;--r-sm:9px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh}
.login-overlay{position:fixed;inset:0;background:var(--cream);display:flex;align-items:center;justify-content:center;z-index:999}
.login-box{background:var(--white);border-radius:24px;padding:40px 36px;width:360px;max-width:92vw;box-shadow:var(--shadow-lg);text-align:center}
.login-logo{font-family:'Playfair Display',serif;font-size:48px;color:var(--red);font-style:italic;margin-bottom:6px}
.login-sub{font-size:12px;color:var(--text-light);letter-spacing:2px;text-transform:uppercase;margin-bottom:32px}
.login-label{font-size:11px;font-weight:700;color:var(--text-mid);letter-spacing:1px;text-transform:uppercase;text-align:left;display:block;margin-bottom:6px}
.login-input{width:100%;padding:12px 16px;border:1.5px solid var(--cream-dark);border-radius:var(--r-sm);font-size:16px;font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);outline:none;text-align:center;letter-spacing:3px;margin-bottom:16px}
.login-input:focus{border-color:var(--red);background:white}
.login-btn{width:100%;background:var(--red);color:white;border:none;padding:13px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif}
.login-error{font-size:12px;color:var(--red);margin-top:10px;display:none;font-weight:500}
.load-overlay{position:fixed;inset:0;background:var(--cream);display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:998}
.load-logo{font-family:'Playfair Display',serif;font-size:44px;color:var(--red);font-style:italic}
.load-bar{width:100px;height:3px;background:var(--cream-dark);border-radius:2px;overflow:hidden}
.load-fill{height:100%;background:var(--red);border-radius:2px;animation:ld 1.5s ease forwards}
@keyframes ld{to{width:100%}}
.header{background:var(--white);border-bottom:1px solid var(--cream-dark);padding:0 20px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 1px 12px rgba(44,24,16,0.06)}
.logo{font-family:'Playfair Display',serif;font-size:24px;color:var(--red);font-style:italic}
.nav-tabs{display:flex;gap:4px}
.nav-tab{padding:7px 14px;border-radius:50px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--text-light);font-family:'DM Sans',sans-serif}
.nav-tab.active{background:var(--red);color:white}
.sync-status{font-size:11px;color:var(--text-light);display:flex;align-items:center;gap:5px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#4CAF50;flex-shrink:0}
.sync-dot.syncing{background:#FF9800;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.app{display:flex;min-height:calc(100vh - 58px)}
.sidebar{width:220px;flex-shrink:0;background:var(--white);border-right:1px solid var(--cream-dark);padding:16px 0;overflow-y:auto}
.content{flex:1;padding:22px 24px;overflow-y:auto;min-width:0}
@media(max-width:768px){.sidebar{display:none}.content{padding:16px}}
.slabel{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-light);padding:10px 18px 4px}
.sitem{display:flex;align-items:center;gap:8px;padding:8px 18px;font-size:13px;font-weight:500;color:var(--text-mid);cursor:pointer;border-left:3px solid transparent}
.sitem:hover{background:var(--cream);color:var(--text)}
.sitem.active{background:var(--red-pale);color:var(--red);font-weight:600;border-left-color:var(--red)}
.scnt{margin-left:auto;font-size:10px;background:var(--cream-dark);padding:2px 7px;border-radius:20px;color:var(--text-mid);font-weight:600}
.scnt.hot{background:var(--red);color:white}
.sdiv{border:none;border-top:1px solid var(--cream-dark);margin:10px 0}
.view{display:none}.view.active{display:block}
.btn{border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;border-radius:50px}
.btn-red{background:var(--red);color:white;padding:9px 18px;font-size:13px}
.btn-ghost{background:transparent;color:var(--text-mid);border:1.5px solid var(--cream-dark);padding:8px 14px;font-size:13px}
.btn-sm{padding:5px 10px;font-size:11px}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.page-title{font-family:'Playfair Display',serif;font-size:28px}
.page-sub{font-size:13px;color:var(--text-light);margin-top:3px}
.stats{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.stat{background:var(--white);border-radius:var(--r);padding:14px 18px;box-shadow:var(--shadow);min-width:100px}
.stat-n{font-family:'Playfair Display',serif;font-size:28px;color:var(--red);line-height:1}
.stat-l{font-size:10px;color:var(--text-light);font-weight:500;text-transform:uppercase;letter-spacing:1px;margin-top:3px}
.fc-list{display:flex;flex-direction:column;gap:12px}
.fc{background:var(--white);border-radius:var(--r);box-shadow:var(--shadow);border:1.5px solid transparent;overflow:hidden}
.fc-head{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;user-select:none;-webkit-user-select:none}
.fc-av{width:38px;height:38px;border-radius:50%;background:var(--red);color:white;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:15px;font-weight:600;flex-shrink:0}
.fc-info{flex:1;min-width:0;pointer-events:none}
.fc-name{font-weight:600;font-size:14px}
.fc-city{font-size:12px;color:var(--text-light);margin-top:1px}
.fc-right{display:flex;align-items:center;gap:8px;flex-shrink:0;pointer-events:none}
.spill{padding:4px 10px;border-radius:50px;font-size:10px;font-weight:700}
.sP{background:#FFF3CD;color:#856404}.sN{background:#FFE4B5;color:#7D5A00}.sF{background:#D4EDDA;color:#155724}.sPre{background:#CCE5FF;color:#004085}.sA{background:#D1ECF1;color:#0C5460}
.prog-wrap{display:flex;flex-direction:column;align-items:center;gap:2px}
.prog-bar{width:70px;height:4px;background:var(--cream-dark);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--red);border-radius:2px}
.prog-txt{font-size:10px;color:var(--text-light);font-weight:500}
.chev{font-size:11px;color:var(--text-light);transition:transform 0.2s;flex-shrink:0}
.chev.open{transform:rotate(180deg)}
.fc-detail{display:none;border-top:1px solid var(--cream-dark)}
.fc-detail.open{display:block}
.pipe-bar{display:flex;background:var(--cream)}
.pipe-step{flex:1;padding:8px 4px;text-align:center;font-size:9px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:var(--text-light);cursor:pointer;border-right:1px solid var(--cream-dark)}
.pipe-step:last-child{border-right:none}
.pipe-step.done{background:var(--red);color:white}
.pipe-step.cur{background:var(--red-pale);color:var(--red);box-shadow:inset 0 -3px 0 var(--red)}
.cl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;padding:16px}
.cl-sec{background:var(--cream);border-radius:var(--r-sm);overflow:hidden;border:1px solid var(--cream-dark)}
.cl-hd{padding:9px 12px;display:flex;justify-content:space-between;align-items:center;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:white}
.hP{background:#8B6F5E}.hN{background:#C8910E}.hF{background:#2D7A4A}.hPre{background:#1A6BAA}.hA{background:#5A2D8A}
.cl-item{display:flex;align-items:flex-start;gap:8px;padding:8px 12px;border-bottom:1px solid var(--cream-dark);background:white}
.cl-item:last-child{border-bottom:none}
.chk{width:16px;height:16px;border:2px solid var(--cream-dark);border-radius:4px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;margin-top:1px}
.chk.on{background:var(--red);border-color:var(--red);color:white}
.cl-lbl{flex:1;font-size:12px;line-height:1.4}
.cl-lbl.done{text-decoration:line-through;color:var(--text-light)}
.folio-row{display:flex;align-items:center;gap:4px;margin-top:4px}
.folio-lbl{font-size:9px;color:var(--text-light);font-weight:600;text-transform:uppercase}
.folio-in{font-size:11px;padding:2px 6px;border:1px solid var(--cream-dark);border-radius:4px;background:var(--cream);color:var(--text-mid);width:95px;outline:none;font-family:'DM Sans',sans-serif}
.fc-notes{padding:12px 16px;border-top:1px solid var(--cream-dark);background:white;display:flex;gap:8px;align-items:flex-start}
.notes-ta{flex:1;padding:8px 11px;border:1.5px solid var(--cream-dark);border-radius:var(--r-sm);font-size:12px;font-family:'DM Sans',sans-serif;resize:none;height:56px;outline:none;color:var(--text)}
.ptabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.ptab{padding:6px 14px;border-radius:50px;font-size:12px;font-weight:600;border:1.5px solid var(--cream-dark);background:white;color:var(--text-mid);cursor:pointer;font-family:'DM Sans',sans-serif}
.ptab.active{background:var(--red);border-color:var(--red);color:white}
.mkt-board{display:flex;flex-direction:column;gap:12px}
.mgrp{background:white;border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;border:1.5px solid var(--cream-dark)}
.mgrp-hd{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;border-bottom:1px solid var(--cream-dark);background:var(--cream);user-select:none;-webkit-user-select:none}
.mgrp-title{font-weight:700;font-size:14px;flex:1;pointer-events:none}
.mgrp-meta{display:flex;align-items:center;gap:8px;pointer-events:none}
.mcat{padding:3px 9px;border-radius:50px;font-size:10px;font-weight:700}
.redes{background:#FFE4F0;color:#9B1B5A}.video{background:#E4F0FF;color:#1B5A9B}.diseno{background:#FFF4E4;color:#9B6A1B}.campana{background:#E4FFE9;color:#1B7A2A}.general{background:var(--cream-dark);color:var(--text-mid)}
.mprog{display:flex;align-items:center;gap:5px}
.mprog-bar{width:50px;height:4px;background:var(--cream-dark);border-radius:2px;overflow:hidden}
.mprog-fill{height:100%;background:var(--red)}
.mprog-txt{font-size:10px;color:var(--text-light);font-weight:500}
.mchev{color:var(--text-light);font-size:11px;transition:transform 0.2s;pointer-events:none}
.mchev.open{transform:rotate(180deg)}
.mtasks{display:none}.mtasks.open{display:block}
.mtask{display:flex;align-items:flex-start;gap:9px;padding:10px 16px;border-bottom:1px solid var(--cream)}
.mtask:last-child{border-bottom:none}
.mtask-body{flex:1}
.mtask-txt{font-size:13px;line-height:1.45}
.mtask-txt.done{text-decoration:line-through;color:var(--text-light)}
.mtask-meta{display:flex;gap:7px;align-items:center;margin-top:4px;flex-wrap:wrap}
.achip{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px}
.aana{background:#FFE4F0;color:#9B1B5A}.aale{background:#E4F0FF;color:#1B5A9B}.aambas{background:#E4FFE9;color:#1B7A2A}
.pdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px}
.palta{background:var(--red)}.pmedia{background:#FF9800}.pbaja{background:#4CAF50}
.tdate{font-size:10px;color:var(--text-light);background:var(--cream);border-radius:20px;padding:2px 7px;border:1px solid var(--cream-dark)}
.madd{display:flex;gap:7px;padding:9px 16px;background:var(--cream);border-top:1px solid var(--cream-dark);flex-wrap:wrap}
.madd-in{flex:1;min-width:160px;padding:7px 11px;border:1.5px solid var(--cream-dark);border-radius:var(--r-sm);font-size:13px;font-family:'DM Sans',sans-serif;background:white;outline:none;color:var(--text)}
.madd-sel{padding:7px 8px;border:1.5px solid var(--cream-dark);border-radius:var(--r-sm);font-size:11px;font-family:'DM Sans',sans-serif;background:white;color:var(--text-mid);cursor:pointer;outline:none}
.overlay{display:none;position:fixed;inset:0;background:rgba(44,24,16,0.45);z-index:300;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:white;border-radius:18px;padding:26px;width:460px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal-title{font-family:'Playfair Display',serif;font-size:22px;margin-bottom:5px}
.modal-sub{font-size:13px;color:var(--text-light);margin-bottom:20px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:11px}
.form-row.full{grid-template-columns:1fr}
.form-g{display:flex;flex-direction:column;gap:4px}
.form-l{font-size:10px;font-weight:700;color:var(--text-mid);letter-spacing:1px;text-transform:uppercase}
.form-in{padding:9px 11px;border:1.5px solid var(--cream-dark);border-radius:var(--r-sm);font-size:13px;font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);outline:none;width:100%}
.form-in:focus{border-color:var(--red);background:white}
.modal-foot{display:flex;gap:9px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--cream-dark)}
.toolbar{display:flex;gap:10px;margin-bottom:16px}
.srch{position:relative}
.srch input{padding:8px 13px 8px 34px;border:1.5px solid var(--cream-dark);border-radius:50px;font-size:13px;font-family:'DM Sans',sans-serif;background:white;color:var(--text);outline:none;width:240px}
.srch-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--text-light);pointer-events:none}
.empty{text-align:center;padding:48px 20px}
.empty-icon{font-size:40px;opacity:0.4;margin-bottom:12px}
.empty-t{font-family:'Playfair Display',serif;font-size:20px;color:var(--text-mid)}
.empty-s{font-size:13px;color:var(--text-light);margin-top:6px}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--cream)}::-webkit-scrollbar-thumb{background:var(--cream-dark);border-radius:3px}
</style>
</head>
<body>

<div id="loginScreen" class="login-overlay">
  <div class="login-box">
    <div class="login-logo">Scoop</div>
    <div class="login-sub">Workspace Interno</div>
    <label class="login-label">Contraseña</label>
    <input class="login-input" type="password" id="loginInput" placeholder="••••••••••">
    <button class="login-btn" id="loginBtn">Entrar</button>
    <div class="login-error" id="loginError">Contraseña incorrecta.</div>
  </div>
</div>

<div id="loader" class="load-overlay">
  <div class="load-logo">Scoop</div>
  <div style="font-size:11px;color:var(--text-light);letter-spacing:2px;text-transform:uppercase">Cargando workspace...</div>
  <div class="load-bar"><div class="load-fill"></div></div>
</div>

<div id="appShell" style="display:none">
  <div class="header">
    <div class="logo">Scoop</div>
    <div class="nav-tabs">
      <button class="nav-tab active" id="tabFC">🏪 Franquicias</button>
      <button class="nav-tab" id="tabMkt">🎨 Marketing</button>
    </div>
    <div class="sync-status"><div class="sync-dot" id="syncDot"></div><span id="syncLabel">Conectando...</span></div>
  </div>
  <div class="app">
    <div class="sidebar" id="sidebar"></div>
    <div class="content">
      <div class="view active" id="view-franchises">
        <div class="page-head">
          <div><div class="page-title">Franquicias</div><div class="page-sub">Pipeline y seguimiento de prospectos</div></div>
          <button class="btn btn-red" id="btnNewFC">+ Nuevo Prospecto</button>
        </div>
        <div class="stats" id="fcStats"></div>
        <div class="toolbar"><div class="srch"><span class="srch-icon">🔍</span><input type="text" id="fcSearch" placeholder="Buscar..."></div></div>
        <div class="fc-list" id="fcList"></div>
      </div>
      <div class="view" id="view-marketing">
        <div class="page-head">
          <div><div class="page-title">Marketing & Contenido</div><div class="page-sub">Pendientes por periodo y campaña</div></div>
          <button class="btn btn-red" id="btnNewMkt">+ Nueva Tarea</button>
        </div>
        <div class="ptabs" id="ptabs"></div>
        <div class="mkt-board" id="mktBoard"></div>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="fcModal">
  <div class="modal">
    <div class="modal-title">Nuevo Prospecto</div>
    <div class="modal-sub">Agrega un prospecto al pipeline</div>
    <div class="form-row">
      <div class="form-g"><label class="form-l">Nombre</label><input class="form-in" id="fcName" placeholder="Ej. Carlos Mendoza"></div>
      <div class="form-g"><label class="form-l">Ciudad</label><select class="form-in" id="fcCity"></select></div>
    </div>
    <div class="form-row">
      <div class="form-g"><label class="form-l">Teléfono</label><input class="form-in" id="fcPhone" placeholder="+52 81 ..."></div>
      <div class="form-g"><label class="form-l">Email</label><input class="form-in" id="fcEmail" type="email" placeholder="correo@..."></div>
    </div>
    <div class="form-row">
      <div class="form-g"><label class="form-l">Etapa</label>
        <select class="form-in" id="fcStage"><option>Prospecto</option><option>Negociación</option><option>Firma</option><option>Pre-Apertura</option><option>Abierta</option></select>
      </div>
      <div class="form-g"><label class="form-l">Fecha contacto</label><input class="form-in" id="fcDate" type="date"></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" id="cancelFC">Cancelar</button>
      <button class="btn btn-red" id="confirmFC">Agregar</button>
    </div>
  </div>
</div>

<div class="overlay" id="mktModal">
  <div class="modal">
    <div class="modal-title">Nueva Tarea</div>
    <div class="modal-sub">Agrega una tarea de marketing</div>
    <div class="form-row full"><div class="form-g"><label class="form-l">Descripción</label><input class="form-in" id="mktText" placeholder="Ej. Diseñar flyer apertura GDL"></div></div>
    <div class="form-row">
      <div class="form-g"><label class="form-l">Periodo</label><input class="form-in" id="mktPeriodIn" placeholder="Ej. ABRIL - JUNIO"></div>
      <div class="form-g"><label class="form-l">Grupo / Campaña</label><input class="form-in" id="mktGroup" placeholder="Ej. Apertura GDL"></div>
    </div>
    <div class="form-row">
      <div class="form-g"><label class="form-l">Categoría</label>
        <select class="form-in" id="mktCat">
          <option value="redes">📱 Redes Sociales</option><option value="video">🎬 Video</option>
          <option value="diseno">🎨 Diseño</option><option value="campana">📣 Campaña</option><option value="general">📋 General</option>
        </select>
      </div>
      <div class="form-g"><label class="form-l">Asignado a</label>
        <select class="form-in" id="mktAssign">
          <option value="ale">Ale (Marketing)</option><option value="ana">Ana (Franquicias)</option><option value="ambas">Ambas</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-g"><label class="form-l">Prioridad</label>
        <select class="form-in" id="mktPriority"><option value="alta">🔴 Alta</option><option value="media">🟡 Media</option><option value="baja">🟢 Baja</option></select>
      </div>
      <div class="form-g"><label class="form-l">Fecha límite</label><input class="form-in" id="mktDue" type="date"></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" id="cancelMkt">Cancelar</button>
      <button class="btn btn-red" id="confirmMkt">Agregar</button>
    </div>
  </div>
</div>

<script>
// ── CONSTANTS ──
var PASSWORD = "KiraBueno401";

var STAGES = ['Prospecto','Negociación','Firma','Pre-Apertura','Abierta'];
var CL = {
  'Prospecto':[{id:'p1',label:'Primer contacto realizado'},{id:'p2',label:'Zoom de presentación agendado'},{id:'p3',label:'Zoom de presentación realizado'},{id:'p4',label:'Deck de franquicias enviado'},{id:'p5',label:'Preguntas frecuentes resueltas'}],
  'Negociación':[{id:'n1',label:'Reunión de negociación agendada'},{id:'n2',label:'Reunión de negociación realizada'},{id:'n3',label:'COF enviado al prospecto'},{id:'n4',label:'COF firmado por el prospecto',folio:'COF'},{id:'n5',label:'Pago de licencia confirmado ($350,000 MXN)'}],

function catEmoji(c){ return {redes:'📱',video:'🎬',diseno:'🎨',campana:'📣',general:'📋'}[c]||''; }
function fmtD(d){ if(!d)return''; var p=d.split('-'); var ms=['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic']; return parseInt(p[2])+' '+ms[parseInt(p[1])]; }
function assignLabel(a){ return a==='ana'?'👩 Ana':a==='ale'?'👩 Ale':'👯 Ambas'; }
function prog(f){
  var t=0,d=0;
  STAGES.forEach(function(s){ CL[s].forEach(function(i){ t++; if(f.checks[i.id])d++; }); });
  return {t:t, d:d, p:t?Math.round(d/t*100):0};
}
function stageClass(s){ return {Prospecto:'sP',Negociación:'sN',Firma:'sF','Pre-Apertura':'sPre',Abierta:'sA'}[s]||'sP'; }
function headClass(s){ return {Prospecto:'hP',Negociación:'hN',Firma:'hF','Pre-Apertura':'hPre',Abierta:'hA'}[s]||'hP'; }

// ── FRANCHISES ──
function renderFranchises(){
  var c = {}; STAGES.forEach(function(s){c[s]=0;}); franchises.forEach(function(f){if(c[f.stage]!==undefined)c[f.stage]++;});
  $('fcStats').innerHTML = '<div class="stat"><div class="stat-n">'+franchises.length+'</div><div class="stat-l">Total</div></div>'
    +STAGES.map(function(s){return '<div class="stat"><div class="stat-n">'+c[s]+'</div><div class="stat-l">'+s+'</div></div>';}).join('');

  var list = franchises.filter(function(f){
    if(fcFilter!=='all' && f.stage!==fcFilter) return false;
    if(fcSearch && f.name.toLowerCase().indexOf(fcSearch.toLowerCase())<0 && f.city.toLowerCase().indexOf(fcSearch.toLowerCase())<0) return false;
    return true;
  });

  var el = $('fcList');
  if(!list.length){ el.innerHTML='<div class="empty"><div class="empty-icon">🍦</div><div class="empty-t">Sin prospectos</div><div class="empty-s">Agrega uno arriba</div></div>'; return; }

  el.innerHTML = list.map(function(f){
    var pr=prog(f), ini=f.name.split(' ').map(function(w){return w[0];}).join('').substring(0,2).toUpperCase();
    var si=STAGES.indexOf(f.stage), isOpen=!!openCards[f.id];
    var sc=stageClass(f.stage);

    var html = '<div class="fc" id="fc-'+f.id+'">';
    html += '<div class="fc-head" data-action="toggle-fc" data-fcid="'+f.id+'">';
    html += '<div class="fc-av">'+ini+'</div>';
    html += '<div class="fc-info"><div class="fc-name">'+f.name+'</div><div class="fc-city">📍 '+f.city+(f.phone?' · '+f.phone:'')+'</div></div>';
    html += '<div class="fc-right"><div class="prog-wrap"><div class="prog-bar"><div class="prog-fill" style="width:'+pr.p+'%"></div></div><div class="prog-txt">'+pr.d+'/'+pr.t+'</div></div>';
    html += '<span class="spill '+sc+'">'+f.stage+'</span><span class="chev'+(isOpen?' open':'')+'">▼</span></div></div>';
    html += '<div class="fc-detail'+(isOpen?' open':'')+'">';

    // Pipeline bar
    html += '<div class="pipe-bar">';
    STAGES.forEach(function(s,i){
      var cls = i<si?'done':i===si?'cur':'';
      html += '<div class="pipe-step '+cls+'" data-action="set-stage" data-fcid="'+f.id+'" data-stage="'+s+'">'+s+'</div>';
    });
    html += '</div>';

    // Checklist grid
    html += '<div class="cl-grid">';
    STAGES.forEach(function(stage){
      var items=CL[stage], d=items.filter(function(i){return f.checks[i.id];}).length;
      html += '<div class="cl-sec"><div class="cl-hd '+headClass(stage)+'">'+stage+'<span>'+d+'/'+items.length+'</span></div>';
      items.forEach(function(item){
        var on = !!f.checks[item.id];
        var fv = item.folio?(f.folios[item.folio]||''):'';
        html += '<div class="cl-item">';
        html += '<div class="chk'+(on?' on':'')+'" data-action="toggle-check" data-fcid="'+f.id+'" data-iid="'+item.id+'">'+(on?'✓':'')+'</div>';
        html += '<div style="flex:1"><div class="cl-lbl'+(on?' done':'')+'">'+item.label+'</div>';
        if(item.folio){
          html += '<div class="folio-row"><span class="folio-lbl">Folio:</span>';
          html += '<input class="folio-in" value="'+fv+'" placeholder="—" data-fcid="'+f.id+'" data-folio="'+item.folio+'" data-action="update-folio"></div>';
        }
        html += '</div></div>';
      });
      html += '</div>';
    });
    html += '</div>';

    // Notes
    html += '<div class="fc-notes"><textarea class="notes-ta" placeholder="Notas internas..." data-fcid="'+f.id+'" data-action="update-notes">'+( f.notes||'')+'</textarea>';
    html += '<button class="btn btn-ghost btn-sm" data-action="delete-fc" data-fcid="'+f.id+'">🗑</button></div>';
    html += '</div></div>';
    return html;
  }).join('');
}

  bd.innerHTML = groups.map(function(g){
    var d=g.tasks.filter(function(t){return t.done;}).length, t=g.tasks.length, p=t?Math.round(d/t*100):0;
    var isOpen = !!openCards['mkt-'+g.id];

    html += '<div class="mprog"><div class="mprog-bar"><div class="mprog-fill" style="width:'+p+'%"></div></div><span class="mprog-txt">'+d+'/'+t+'</span></div></div>';

      html += '<div class="mtask'+(tk.subtask?' subtask':'')+'">';

      html += '<div class="mtask-body"><div class="mtask-txt'+(tk.done?' done':'')+'">'+tk.text+'</div>';
      html += '<div class="mtask-meta">'+(tk.assign?'<span class="achip a'+tk.assign+'">'+assignLabel(tk.assign)+'</span>':'')+(tk.due?'<span class="tdate">📅 '+fmtD(tk.due)+'</span>':'')+'</div></div>';
      html += '<button class="btn btn-ghost btn-sm" data-action="delete-mtask" data-gid="'+g.id+'" data-tid="'+tk.id+'">🗑</button></div>';
    });

    html += '<select class="madd-sel" id="qa'+g.id+'"><option value="ale">Ale</option><option value="ana">Ana</option><option value="ambas">Ambas</option></select>';
    html += '<button class="btn btn-red btn-sm" data-action="quick-add" data-gid="'+g.id+'">+</button></div>';
    html += '</div></div>';
    return html;

  // Add enter key for quick add inputs

    var inp = $('q'+g.id);
    if(inp) inp.addEventListener('keydown', function(e){ if(e.key==='Enter') doQuickAdd(g.id); });
  });
}

// ── MASTER EVENT HANDLER ──
document.addEventListener('click', function(e){
  var el = e.target;
  // Walk up to find data-action
  for(var i=0; i<6; i++){
    if(!el || el===document.body) break;
    var action = el.getAttribute('data-action');
    if(action){
      handleAction(action, el, e);
      return;
    }
    el = el.parentElement;
  }
});

document.addEventListener('change', function(e){
  var el = e.target;
  var action = el.getAttribute('data-action');
  if(action === 'update-folio'){
    var f = franchises.find(function(x){return x.id===el.getAttribute('data-fcid');});
    if(f){ f.folios[el.getAttribute('data-folio')] = el.value; saveFC(); }
  }
  if(action === 'update-notes'){
    var f2 = franchises.find(function(x){return x.id===el.getAttribute('data-fcid');});
    if(f2){ f2.notes = el.value; saveFC(); }
  }
});

function handleAction(action, el, e){
  var fcid = el.getAttribute('data-fcid');
  var gid = el.getAttribute('data-gid');
  var tid = el.getAttribute('data-tid');

  if(action === 'toggle-fc'){
    var id = el.getAttribute('data-fcid');
    openCards[id] = !openCards[id];
    renderFranchises();
    return;
  }
  if(action === 'set-stage'){
    e.stopPropagation();
    var f = franchises.find(function(x){return x.id===fcid;});
    if(f){ f.stage = el.getAttribute('data-stage'); openCards[fcid]=true; renderFranchises(); saveFC(); }
    return;
  }
  if(action === 'toggle-check'){
    e.stopPropagation();
    var f2 = franchises.find(function(x){return x.id===fcid;});
    if(f2){ f2.checks[el.getAttribute('data-iid')] = !f2.checks[el.getAttribute('data-iid')]; openCards[fcid]=true; renderFranchises(); saveFC(); }
    return;
  }
  if(action === 'delete-fc'){
    if(!confirm('¿Eliminar este prospecto?')) return;
    franchises = franchises.filter(function(f){return f.id!==fcid;});
    delete openCards[fcid];
    renderFranchises(); renderSidebar(); saveFC();
    return;
  }
  if(action === 'filter-all'){ fcFilter='all'; fcSearch=''; $('fcSearch').value=''; renderSidebar(); renderFranchises(); return; }
  if(action === 'filter-stage'){ fcFilter=el.getAttribute('data-stage'); fcSearch=''; $('fcSearch').value=''; renderSidebar(); renderFranchises(); return; }
  if(action === 'filter-city'){ fcSearch=el.getAttribute('data-city'); fcFilter='all'; renderFranchises(); return; }
  if(action === 'add-city'){
    var n = prompt('Nombre de la nueva ciudad:');
    if(!n||!n.trim()) return;
    if(cities.indexOf(n.trim())<0){ cities.push(n.trim()); saveCTY(); renderSidebar(); updateCityDrop(); }
    else alert('Ya existe.');
    return;
  }
  if(action === 'toggle-mgrp'){
    var key = 'mkt-'+gid;
    openCards[key] = !openCards[key];
    renderMarketing();
    return;
  }
  if(action === 'toggle-mtask'){
    e.stopPropagation();
    var g = mktData.groups.find(function(x){return x.id===gid;});
    if(g){ var tk = g.tasks.find(function(x){return x.id===tid;}); if(tk){ tk.done=!tk.done; openCards['mkt-'+gid]=true; renderMarketing(); saveMKT(); } }
    return;
  }
  if(action === 'delete-mtask'){
    var g2 = mktData.groups.find(function(x){return x.id===gid;});
    if(g2){ g2.tasks = g2.tasks.filter(function(t){return t.id!==tid;}); openCards['mkt-'+gid]=true; renderMarketing(); saveMKT(); }
    return;
  }
  if(action === 'quick-add'){ doQuickAdd(gid); return; }
  if(action === 'set-period'){ mktPeriod=el.getAttribute('data-period'); renderSidebar(); renderMarketing(); return; }
  if(action === 'add-period'){
    var nm = prompt('Nombre del periodo (ej. JULIO - SEPTIEMBRE):');
    if(!nm||!nm.trim()) return;
    if(mktData.periods.indexOf(nm.trim())<0) mktData.periods.push(nm.trim());
    mktPeriod=nm.trim(); renderMarketing(); renderSidebar(); saveMKT();
    return;
  }
  if(action === 'set-mcat'){ mktCat = mktCat===el.getAttribute('data-cat')?'all':el.getAttribute('data-cat'); renderMarketing(); return; }
}

function doQuickAdd(gid){
  var inp = $('q'+gid), asel = $('qa'+gid);
  if(!inp||!inp.value.trim()) return;
  var g = mktData.groups.find(function(x){return x.id===gid;});
  if(!g) return;
  g.tasks.push({id:'t'+Date.now(), text:inp.value.trim(), done:false, assign:asel?asel.value:'ale', priority:'media', due:'', subtask:false});
  inp.value = '';
  openCards['mkt-'+gid] = true;
  renderMarketing(); saveMKT();
}

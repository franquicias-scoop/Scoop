<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Scoop Workspace</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root{--cream:#F7F0E8;--cream-dark:#EDE4D8;--red:#C8102E;--red-pale:#FDEDF0;--text:#2C1810;--text-mid:#6B4C3B;--text-light:#A08070;--white:#fff;--shadow:0 2px 16px rgba(44,24,16,.07);--shadow-lg:0 16px 56px rgba(44,24,16,.15);--r:14px;--rs:9px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh}

/* LOGIN */
#loginScreen{position:fixed;inset:0;background:var(--cream);display:flex;align-items:center;justify-content:center;z-index:999}
.lbox{background:var(--white);border-radius:24px;padding:40px 36px;width:360px;max-width:92vw;box-shadow:var(--shadow-lg);text-align:center}
.llogo{font-family:'Playfair Display',serif;font-size:48px;color:var(--red);font-style:italic;margin-bottom:6px}
.lsub{font-size:11px;color:var(--text-light);letter-spacing:2px;text-transform:uppercase;margin-bottom:30px}
.llabel{font-size:10px;font-weight:700;color:var(--text-mid);letter-spacing:1px;text-transform:uppercase;text-align:left;display:block;margin-bottom:6px}
.linput{width:100%;padding:12px 16px;border:1.5px solid var(--cream-dark);border-radius:var(--rs);font-size:16px;font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);outline:none;text-align:center;letter-spacing:3px;margin-bottom:14px}
.linput:focus{border-color:var(--red);background:white}
.lbtn{width:100%;background:var(--red);color:white;border:none;padding:13px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif}
.lerr{font-size:12px;color:var(--red);margin-top:8px;display:none}

/* LOADER */
#loader{position:fixed;inset:0;background:var(--cream);display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px;z-index:998}
.lloogo{font-family:'Playfair Display',serif;font-size:44px;color:var(--red);font-style:italic}
.lbar{width:100px;height:3px;background:var(--cream-dark);border-radius:2px;overflow:hidden}
.lfill{height:100%;background:var(--red);border-radius:2px;animation:ld 1.5s ease forwards}
@keyframes ld{to{width:100%}}

/* APP */
#app{display:none}
.header{background:var(--white);border-bottom:1px solid var(--cream-dark);padding:0 20px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 1px 12px rgba(44,24,16,.06)}
.hlogo{font-family:'Playfair Display',serif;font-size:24px;color:var(--red);font-style:italic}
.ntabs{display:flex;gap:4px}
.ntab{padding:7px 14px;border-radius:50px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--text-light);font-family:'DM Sans',sans-serif}
.ntab.on{background:var(--red);color:white}
.hright{font-size:11px;color:var(--text-light);display:flex;align-items:center;gap:6px}
.sdot{width:7px;height:7px;border-radius:50%;background:#4CAF50}
.sdot.sy{background:#FF9800;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.layout{display:flex;min-height:calc(100vh - 58px)}
.sidebar{width:220px;flex-shrink:0;background:var(--white);border-right:1px solid var(--cream-dark);padding:16px 0;overflow-y:auto}
.main{flex:1;padding:22px 24px;overflow-y:auto;min-width:0}
@media(max-width:768px){.sidebar{display:none}.main{padding:16px}}

.slbl{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-light);padding:10px 18px 4px}
.si{display:flex;align-items:center;gap:8px;padding:8px 18px;font-size:13px;font-weight:500;color:var(--text-mid);cursor:pointer;border-left:3px solid transparent}
.si:hover{background:var(--cream)}
.si.on{background:var(--red-pale);color:var(--red);font-weight:600;border-left-color:var(--red)}
.sbadge{margin-left:auto;font-size:10px;background:var(--cream-dark);padding:2px 7px;border-radius:20px;color:var(--text-mid);font-weight:600}
.sbadge.h{background:var(--red);color:white}
.sdivider{border:none;border-top:1px solid var(--cream-dark);margin:10px 0}

.view{display:none}.view.on{display:block}

/* BUTTONS */
.btn{border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;border-radius:50px;font-size:13px}
.bred{background:var(--red);color:white;padding:9px 18px}
.bghost{background:transparent;color:var(--text-mid);border:1.5px solid var(--cream-dark);padding:8px 14px}
.bsm{padding:5px 10px;font-size:11px}

.phead{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.ptitle{font-family:'Playfair Display',serif;font-size:28px}
.psub{font-size:13px;color:var(--text-light);margin-top:3px}

.stats{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.stat{background:var(--white);border-radius:var(--r);padding:14px 18px;box-shadow:var(--shadow);min-width:100px}
.statn{font-family:'Playfair Display',serif;font-size:28px;color:var(--red);line-height:1}
.statl{font-size:10px;color:var(--text-light);font-weight:500;text-transform:uppercase;letter-spacing:1px;margin-top:3px}

/* FC CARDS */
.fclist{display:flex;flex-direction:column;gap:12px}
.fc{background:var(--white);border-radius:var(--r);box-shadow:var(--shadow);border:1.5px solid transparent;overflow:hidden}
.fch{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;-webkit-user-select:none;user-select:none}
.fcav{width:38px;height:38px;border-radius:50%;background:var(--red);color:white;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:15px;font-weight:600;flex-shrink:0;pointer-events:none}
.fci{flex:1;min-width:0;pointer-events:none}
.fcn{font-weight:600;font-size:14px}
.fcc{font-size:12px;color:var(--text-light);margin-top:1px}
.fcr{display:flex;align-items:center;gap:8px;flex-shrink:0;pointer-events:none}
.spill{padding:4px 10px;border-radius:50px;font-size:10px;font-weight:700}
.sp0{background:#FFF3CD;color:#856404}.sp1{background:#FFE4B5;color:#7D5A00}.sp2{background:#D4EDDA;color:#155724}.sp3{background:#CCE5FF;color:#004085}.sp4{background:#D1ECF1;color:#0C5460}
.pbar{width:70px;height:4px;background:var(--cream-dark);border-radius:2px;overflow:hidden}
.pfill{height:100%;background:var(--red);border-radius:2px}
.ptxt{font-size:10px;color:var(--text-light);font-weight:500}
.chev{font-size:11px;color:var(--text-light);transition:transform .2s;flex-shrink:0}
.chev.op{transform:rotate(180deg)}

.fcd{display:none;border-top:1px solid var(--cream-dark)}
.fcd.op{display:block}

.pipebar{display:flex;background:var(--cream)}
.pstep{flex:1;padding:8px 4px;text-align:center;font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text-light);cursor:pointer;border-right:1px solid var(--cream-dark)}
.pstep:last-child{border-right:none}
.pstep.done{background:var(--red);color:white}
.pstep.cur{background:var(--red-pale);color:var(--red);box-shadow:inset 0 -3px 0 var(--red)}

.clgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;padding:16px}
.clsec{background:var(--cream);border-radius:var(--rs);overflow:hidden;border:1px solid var(--cream-dark)}
.clhd{padding:9px 12px;display:flex;justify-content:space-between;align-items:center;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:white}
.h0{background:#8B6F5E}.h1{background:#C8910E}.h2{background:#2D7A4A}.h3{background:#1A6BAA}.h4{background:#5A2D8A}
.cli{display:flex;align-items:flex-start;gap:8px;padding:8px 12px;border-bottom:1px solid var(--cream-dark);background:white}
.cli:last-child{border-bottom:none}
.chk{width:16px;height:16px;border:2px solid var(--cream-dark);border-radius:4px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;margin-top:1px;-webkit-user-select:none;user-select:none}
.chk.on{background:var(--red);border-color:var(--red);color:white}
.clbl{flex:1;font-size:12px;line-height:1.4}
.clbl.done{text-decoration:line-through;color:var(--text-light)}
.folrow{display:flex;align-items:center;gap:4px;margin-top:4px}
.follbl{font-size:9px;color:var(--text-light);font-weight:600;text-transform:uppercase}
.folin{font-size:11px;padding:2px 6px;border:1px solid var(--cream-dark);border-radius:4px;background:var(--cream);color:var(--text-mid);width:95px;outline:none;font-family:'DM Sans',sans-serif}
.fcnotes{padding:12px 16px;border-top:1px solid var(--cream-dark);background:white;display:flex;gap:8px;align-items:flex-start}
.nta{flex:1;padding:8px 11px;border:1.5px solid var(--cream-dark);border-radius:var(--rs);font-size:12px;font-family:'DM Sans',sans-serif;resize:none;height:56px;outline:none;color:var(--text)}

/* MARKETING */
.periodtabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.ptab{padding:6px 14px;border-radius:50px;font-size:12px;font-weight:600;border:1.5px solid var(--cream-dark);background:white;color:var(--text-mid);cursor:pointer;font-family:'DM Sans',sans-serif}
.ptab.on{background:var(--red);border-color:var(--red);color:white}
.mboard{display:flex;flex-direction:column;gap:12px}
.mgrp{background:white;border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;border:1.5px solid var(--cream-dark)}
.mghd{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;border-bottom:1px solid var(--cream-dark);background:var(--cream);-webkit-user-select:none;user-select:none}
.mgtitle{font-weight:700;font-size:14px;flex:1;pointer-events:none}
.mgmeta{display:flex;align-items:center;gap:8px;pointer-events:none}
.mcat{padding:3px 9px;border-radius:50px;font-size:10px;font-weight:700}
.credes{background:#FFE4F0;color:#9B1B5A}.cvideo{background:#E4F0FF;color:#1B5A9B}.cdiseno{background:#FFF4E4;color:#9B6A1B}.ccampana{background:#E4FFE9;color:#1B7A2A}.cgeneral{background:var(--cream-dark);color:var(--text-mid)}
.mpb{width:50px;height:4px;background:var(--cream-dark);border-radius:2px;overflow:hidden}
.mpbf{height:100%;background:var(--red)}
.mptxt{font-size:10px;color:var(--text-light);font-weight:500}
.mgchev{color:var(--text-light);font-size:11px;transition:transform .2s;pointer-events:none}
.mgchev.op{transform:rotate(180deg)}
.mtasks{display:none}.mtasks.op{display:block}
.mtask{display:flex;align-items:flex-start;gap:9px;padding:10px 16px;border-bottom:1px solid var(--cream)}
.mtask:last-child{border-bottom:none}
.mtbody{flex:1}
.mttxt{font-size:13px;line-height:1.45}
.mttxt.done{text-decoration:line-through;color:var(--text-light)}
.mtmeta{display:flex;gap:7px;align-items:center;margin-top:4px;flex-wrap:wrap}
.ac{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px}
.acor{background:#F0E8FF;color:#5A2D8A}.aale{background:#E4F0FF;color:#1B5A9B}.aana{background:#FFE4F0;color:#9B1B5A}.aambas{background:#E4FFE9;color:#1B7A2A}
.pdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px}
.palta{background:var(--red)}.pmedia{background:#FF9800}.pbaja{background:#4CAF50}
.tdate{font-size:10px;color:var(--text-light);background:var(--cream);border-radius:20px;padding:2px 7px;border:1px solid var(--cream-dark)}

/* REFS (links/pdfs/media) */
.refs{padding:10px 16px 6px;display:flex;flex-wrap:wrap;gap:6px}
.ref-item{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:500;background:var(--cream);border:1px solid var(--cream-dark);color:var(--text-mid);text-decoration:none;cursor:pointer;max-width:220px}
.ref-item:hover{border-color:var(--red);color:var(--red)}
.ref-del{margin-left:4px;font-size:10px;cursor:pointer;opacity:.5;flex-shrink:0}
.ref-del:hover{opacity:1}
.ref-add{display:flex;gap:6px;padding:6px 16px 10px;flex-wrap:wrap}
.ref-in{flex:1;min-width:180px;padding:6px 10px;border:1.5px solid var(--cream-dark);border-radius:var(--rs);font-size:12px;font-family:'DM Sans',sans-serif;background:white;outline:none;color:var(--text)}
.ref-in:focus{border-color:var(--red)}

.madd{display:flex;gap:7px;padding:9px 16px;background:var(--cream);border-top:1px solid var(--cream-dark);flex-wrap:wrap}
.maddin{flex:1;min-width:160px;padding:7px 11px;border:1.5px solid var(--cream-dark);border-radius:var(--rs);font-size:13px;font-family:'DM Sans',sans-serif;background:white;outline:none;color:var(--text)}
.maddsel{padding:7px 8px;border:1.5px solid var(--cream-dark);border-radius:var(--rs);font-size:11px;font-family:'DM Sans',sans-serif;background:white;color:var(--text-mid);cursor:pointer;outline:none}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(44,24,16,.45);z-index:300;align-items:center;justify-content:center}
.overlay.on{display:flex}
.modal{background:white;border-radius:18px;padding:26px;width:460px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.mtitle{font-family:'Playfair Display',serif;font-size:22px;margin-bottom:5px}
.msub{font-size:13px;color:var(--text-light);margin-bottom:20px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:11px}
.frow.full{grid-template-columns:1fr}
.fg{display:flex;flex-direction:column;gap:4px}
.fl{font-size:10px;font-weight:700;color:var(--text-mid);letter-spacing:1px;text-transform:uppercase}
.fi{padding:9px 11px;border:1.5px solid var(--cream-dark);border-radius:var(--rs);font-size:13px;font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);outline:none;width:100%}
.fi:focus{border-color:var(--red);background:white}
.mfoot{display:flex;gap:9px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--cream-dark)}

.toolbar{display:flex;gap:10px;margin-bottom:16px}
.srch{position:relative}
.srch input{padding:8px 13px 8px 34px;border:1.5px solid var(--cream-dark);border-radius:50px;font-size:13px;font-family:'DM Sans',sans-serif;background:white;color:var(--text);outline:none;width:240px}
.srch-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--text-light);pointer-events:none}
.empty{text-align:center;padding:48px 20px}
.empty-icon{font-size:40px;opacity:.4;margin-bottom:12px}
.empty-t{font-family:'Playfair Display',serif;font-size:20px;color:var(--text-mid)}
.empty-s{font-size:13px;color:var(--text-light);margin-top:6px}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--cream)}::-webkit-scrollbar-thumb{background:var(--cream-dark);border-radius:3px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="lbox">
    <div class="llogo">Scoop</div>
    <div class="lsub">Workspace Interno</div>
    <label class="llabel">Contraseña</label>
    <input class="linput" type="password" id="pwInput" placeholder="••••••••••">
    <button class="lbtn" id="loginBtn">Entrar</button>
    <div class="lerr" id="loginErr">Contraseña incorrecta.</div>
  </div>
</div>

<!-- LOADER -->
<div id="loader">
  <div class="lloogo">Scoop</div>
  <div style="font-size:11px;color:var(--text-light);letter-spacing:2px;text-transform:uppercase">Cargando...</div>
  <div class="lbar"><div class="lfill"></div></div>
</div>

<!-- APP -->
<div id="app">
  <div class="header">
    <div class="hlogo">Scoop</div>
    <div class="ntabs" id="ntabs"></div>
    <div class="hright"><div class="sdot" id="sdot"></div><span id="slbl">Conectando...</span></div>
  </div>
  <div class="layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="main">

      <!-- FRANQUICIAS -->
      <div class="view" id="vfc">
        <div class="phead">
          <div><div class="ptitle">Franquicias</div><div class="psub">Pipeline y seguimiento de prospectos</div></div>
          <button class="btn bred" id="btnFC">+ Nuevo Prospecto</button>
        </div>
        <div class="stats" id="fcstats"></div>
        <div class="toolbar"><div class="srch"><span class="srch-icon">🔍</span><input type="text" id="fcsrch" placeholder="Buscar..."></div></div>
        <div class="fclist" id="fclist"></div>
      </div>

      <!-- MARKETING -->
      <div class="view" id="vmkt">
        <div class="phead">
          <div><div class="ptitle">Marketing & Contenido</div><div class="psub">Pendientes por periodo y campaña</div></div>
          <button class="btn bred" id="btnMkt">+ Nueva Tarea</button>
        </div>
        <div class="periodtabs" id="ptabs"></div>
        <div class="mboard" id="mboard"></div>
      </div>

    </div>
  </div>
</div>

<!-- FC MODAL -->
<div class="overlay" id="fcModal">
  <div class="modal">
    <div class="mtitle">Nuevo Prospecto</div>
    <div class="msub">Agrega un prospecto al pipeline</div>
    <div class="frow"><div class="fg"><label class="fl">Nombre</label><input class="fi" id="mfcName" placeholder="Ej. Carlos Mendoza"></div><div class="fg"><label class="fl">Ciudad</label><select class="fi" id="mfcCity"></select></div></div>
    <div class="frow"><div class="fg"><label class="fl">Teléfono</label><input class="fi" id="mfcPhone" placeholder="+52 81 ..."></div><div class="fg"><label class="fl">Email</label><input class="fi" id="mfcEmail" type="email" placeholder="correo@..."></div></div>
    <div class="frow">
      <div class="fg"><label class="fl">Etapa</label><select class="fi" id="mfcStage"><option>Prospecto</option><option>Negociación</option><option>Firma</option><option>Pre-Apertura</option><option>Abierta</option></select></div>
      <div class="fg"><label class="fl">Fecha</label><input class="fi" id="mfcDate" type="date"></div>
    </div>
    <div class="mfoot"><button class="btn bghost" id="cancelFC">Cancelar</button><button class="btn bred" id="okFC">Agregar</button></div>
  </div>
</div>

<!-- MKT MODAL -->
<div class="overlay" id="mktModal">
  <div class="modal">
    <div class="mtitle">Nueva Tarea</div>
    <div class="msub">Agrega una tarea de marketing</div>
    <div class="frow full"><div class="fg"><label class="fl">Descripción</label><input class="fi" id="mmText" placeholder="Ej. Diseñar flyer apertura GDL"></div></div>
    <div class="frow"><div class="fg"><label class="fl">Periodo</label><input class="fi" id="mmPeriod" placeholder="Ej. ABRIL - JUNIO"></div><div class="fg"><label class="fl">Grupo / Campaña</label><input class="fi" id="mmGroup" placeholder="Ej. Apertura GDL"></div></div>
    <div class="frow">
      <div class="fg"><label class="fl">Categoría</label><select class="fi" id="mmCat"><option value="redes">📱 Redes Sociales</option><option value="video">🎬 Video</option><option value="diseno">🎨 Diseño</option><option value="campana">📣 Campaña</option><option value="general">📋 General</option></select></div>
      <div class="fg"><label class="fl">Asignado a</label><select class="fi" id="mmAssign"><option value="ale">Ale</option><option value="cor">Cordelia</option><option value="ana">Ana</option><option value="ambas">Todas</option></select></div>
    </div>
    <div class="frow"><div class="fg"><label class="fl">Prioridad</label><select class="fi" id="mmPrio"><option value="alta">🔴 Alta</option><option value="media">🟡 Media</option><option value="baja">🟢 Baja</option></select></div><div class="fg"><label class="fl">Fecha límite</label><input class="fi" id="mmDue" type="date"></div></div>
    <div class="mfoot"><button class="btn bghost" id="cancelMkt">Cancelar</button><button class="btn bred" id="okMkt">Agregar</button></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

// ── FIREBASE ──
const fbApp = initializeApp({
  apiKey:"AIzaSyCxjl39lsYyQMVNPPjdPn1dIr5uv47YjsU",
  authDomain:"scoop-frozen-yogurt.firebaseapp.com",
  projectId:"scoop-frozen-yogurt",
  storageBucket:"scoop-frozen-yogurt.firebasestorage.app",
  messagingSenderId:"880756018979",
  appId:"1:880756018979:web:e2536756a63f1b7ee18696"
});
const db = getFirestore(fbApp);
const FC = doc(db,'ws','franchises');
const MKT = doc(db,'ws','marketing');
const CTY = doc(db,'ws','cities');

// ── USERS ──
const USERS = {
  'KiraBueno401': {name:'Cordelia', role:'owner'},
  'scoop2026':    {name:'Ana',      role:'marketing'}

// ── RENDER FC ──
function renderFC(){
  const cnt={}; STAGES.forEach(s=>cnt[s]=0); franchises.forEach(f=>{if(cnt[f.stage]!==undefined)cnt[f.stage]++;});
  g('fcstats').innerHTML=`<div class="stat"><div class="statn">${franchises.length}</div><div class="statl">Total</div></div>`
    +STAGES.map(s=>`<div class="stat"><div class="statn">${cnt[s]}</div><div class="statl">${s}</div></div>`).join('');

  const list = franchises.filter(f=>{
    if(fcFilter!=='all'&&f.stage!==fcFilter)return false;
    if(fcSearch&&!f.name.toLowerCase().includes(fcSearch.toLowerCase())&&!f.city.toLowerCase().includes(fcSearch.toLowerCase()))return false;
    return true;
  });

  const el=g('fclist');
  if(!list.length){el.innerHTML=`<div class="empty"><div class="empty-icon">🍦</div><div class="empty-t">Sin prospectos</div><div class="empty-s">Agrega uno arriba</div></div>`;return;}

  el.innerHTML = list.map(f=>{
    const pr=prog(f);
    const ini=f.name.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
    const si=STAGES.indexOf(f.stage);
    const isOpen=!!openFC[f.id];
    const pillCls=['sp0','sp1','sp2','sp3','sp4'][si]||'sp0';
    const hCls=['h0','h1','h2','h3','h4'];

    let html=`<div class="fc" id="fc-${f.id}">
      <div class="fch" id="fch-${f.id}">
        <div class="fcav">${ini}</div>
        <div class="fci"><div class="fcn">${f.name}</div><div class="fcc">📍 ${f.city}${f.phone?' · '+f.phone:''}</div></div>
        <div class="fcr">
          <div><div class="pbar"><div class="pfill" style="width:${pr.p}%"></div></div><div class="ptxt">${pr.d}/${pr.t}</div></div>
          <span class="spill ${pillCls}">${f.stage}</span>
          <span class="chev${isOpen?' op':''}">▼</span>
        </div>
      </div>
      <div class="fcd${isOpen?' op':''}" id="fcd-${f.id}">
        <div class="pipebar">`;
    STAGES.forEach((s,i)=>{
      const cls=i<si?'done':i===si?'cur':'';
      html+=`<div class="pstep ${cls}" id="ps-${f.id}-${i}">${s}</div>`;
    });
    html+=`</div><div class="clgrid">`;
    STAGES.forEach((stage,si2)=>{
      const items=CL[stage];
      const d=items.filter(i=>f.checks[i.id]).length;
      html+=`<div class="clsec"><div class="clhd ${hCls[si2]}">${stage}<span>${d}/${items.length}</span></div>`;
      items.forEach(item=>{
        const on=!!f.checks[item.id];
        const fv=item.folio?(f.folios[item.folio]||''):'';
        html+=`<div class="cli">
          <div class="chk${on?' on':''}" id="chk-${f.id}-${item.id}">${on?'✓':''}</div>
          <div style="flex:1"><div class="clbl${on?' done':''}">${item.lbl}</div>
          ${item.folio?`<div class="folrow"><span class="follbl">Folio:</span><input class="folin" id="fol-${f.id}-${item.folio}" value="${fv}" placeholder="—"></div>`:''}
          </div></div>`;
      });
      html+=`</div>`;
    });
    html+=`</div>
      <div class="fcnotes">
        <textarea class="nta" id="nta-${f.id}" placeholder="Notas internas...">${f.notes||''}</textarea>
        <button class="btn bghost bsm" id="del-${f.id}">🗑</button>
      </div></div></div>`;
    return html;
  }).join('');

  // Attach events after rendering
  list.forEach(f=>{
    // Toggle card
    const head = g(`fch-${f.id}`);
    if(head) head.addEventListener('click', e=>{
      if(e.target.closest('.pstep')||e.target.closest('.chk')||e.target.closest('.folin')||e.target.closest('.nta')||e.target.closest('.btn'))return;
      openFC[f.id]=!openFC[f.id];
      renderFC();
    });

    // Pipeline steps
    STAGES.forEach((s,i)=>{
      const ps=g(`ps-${f.id}-${i}`);
      if(ps) ps.addEventListener('click', e=>{
        e.stopPropagation();
        const fc=franchises.find(x=>x.id===f.id);
        if(fc){fc.stage=s;openFC[f.id]=true;renderFC();saveFC();}
      });
    });

    // Checkboxes
    STAGES.forEach(stage=>{
      CL[stage].forEach(item=>{
        const chk=g(`chk-${f.id}-${item.id}`);
        if(chk) chk.addEventListener('click', e=>{
          e.stopPropagation();
          const fc=franchises.find(x=>x.id===f.id);
          if(fc){fc.checks[item.id]=!fc.checks[item.id];openFC[f.id]=true;renderFC();saveFC();}
        });
        // Folio input
        if(item.folio){
          const fol=g(`fol-${f.id}-${item.folio}`);
          if(fol) fol.addEventListener('change', e=>{
            e.stopPropagation();
            const fc=franchises.find(x=>x.id===f.id);
            if(fc){fc.folios[item.folio]=fol.value;saveFC();}
          });
        }
      });
    });

    // Notes
    const nta=g(`nta-${f.id}`);
    if(nta) nta.addEventListener('change', e=>{
      e.stopPropagation();
      const fc=franchises.find(x=>x.id===f.id);
      if(fc){fc.notes=nta.value;saveFC();}
    });

    // Delete
    const del=g(`del-${f.id}`);
    if(del) del.addEventListener('click', e=>{
      e.stopPropagation();
      if(!confirm('¿Eliminar este prospecto?'))return;
      franchises=franchises.filter(x=>x.id!==f.id);
      delete openFC[f.id];
      renderFC();renderSidebar();saveFC();
    });
  });
}

    const n=prompt('Nombre del periodo:');

    if(!mktData.periods.includes(n.trim()))mktData.periods.push(n.trim());
    mktPeriod=n.trim();renderMkt();renderSidebar();saveMKT();

  const groups=mktData.groups.filter(gr=>gr.period===mktPeriod);

  bd.innerHTML=groups.map(gr=>{
    const d=gr.tasks.filter(t=>t.done).length,t=gr.tasks.length,p=t?Math.round(d/t*100):0;
    const isOpen=!!openMG[gr.id];
    let html=`<div class="mgrp">
      <div class="mghd" id="mgh-${gr.id}">
        <span style="font-size:18px;pointer-events:none">${gr.emoji||'📋'}</span>
        <span class="mgtitle">${gr.title}</span>
        <div class="mgmeta">
          <span class="mcat c${gr.cat}">${catEmoji(gr.cat)} ${gr.cat}</span>
          <div style="display:flex;align-items:center;gap:5px"><div class="mpb"><div class="mpbf" style="width:${p}%"></div></div><span class="mptxt">${d}/${t}</span></div>
        </div>
        <span class="mgchev${isOpen?' op':''}">▼</span>
      </div>
      <div class="mtasks${isOpen?' op':''}" id="mgt-${gr.id}">`;

    // Refs section
    const refs=gr.refs||[];
    if(refs.length||isOpen){
      html+=`<div class="refs">`;
      refs.forEach((ref,ri)=>{
        const icon=ref.type==='link'?'🔗':ref.type==='pdf'?'📄':ref.type==='video'?'🎬':'🖼';
        html+=`<a class="ref-item" href="${ref.url}" target="_blank" rel="noopener">${icon} ${ref.name||ref.url.substring(0,30)}<span class="ref-del" id="refdel-${gr.id}-${ri}">✕</span></a>`;
      });
      html+=`</div>
      <div class="ref-add">
        <input class="ref-in" id="refin-${gr.id}" placeholder="Pega un link, URL de imagen o PDF...">
        <input class="ref-in" id="refname-${gr.id}" placeholder="Nombre (opcional)" style="max-width:160px">
        <button class="btn bred bsm" id="refadd-${gr.id}">+ Agregar</button>
      </div>`;
    }

    gr.tasks.forEach((tk,ti)=>{
      html+=`<div class="mtask">
        <div class="pdot p${tk.prio||'media'}"></div>
        <div class="chk${tk.done?' on':''}" id="mchk-${gr.id}-${tk.id}">${tk.done?'✓':''}</div>
        <div class="mtbody">
          <div class="mttxt${tk.done?' done':''}">${tk.txt}</div>
          <div class="mtmeta">
            ${tk.assign?`<span class="ac ${assignClass(tk.assign)}">${assignLabel(tk.assign)}</span>`:''}
            ${tk.due?`<span class="tdate">📅 ${fmtDate(tk.due)}</span>`:''}
          </div>
        </div>
        <button class="btn bghost bsm" id="tdel-${gr.id}-${tk.id}">🗑</button>
      </div>`;
    });

    html+=`<div class="madd">
      <input class="maddin" id="qadd-${gr.id}" placeholder="+ Agregar tarea rápida...">
      <select class="maddsel" id="qasgn-${gr.id}"><option value="ale">Ale</option><option value="cor">Cordelia</option><option value="ana">Ana</option><option value="ambas">Todas</option></select>
      <button class="btn bred bsm" id="qbtn-${gr.id}">+</button>
    </div></div></div>`;
    return html;
  }).join('');

  // Attach events
  groups.forEach(gr=>{
    // Group toggle
    const mgh=g(`mgh-${gr.id}`);
    if(mgh) mgh.addEventListener('click',e=>{
      if(e.target.closest('.btn')||e.target.closest('a'))return;
      openMG[gr.id]=!openMG[gr.id];renderMkt();
    });

    // Task checkboxes
    gr.tasks.forEach(tk=>{
      const chk=g(`mchk-${gr.id}-${tk.id}`);
      if(chk) chk.addEventListener('click',e=>{
        e.stopPropagation();
        const gd=mktData.groups.find(x=>x.id===gr.id);
        const td=gd?.tasks.find(x=>x.id===tk.id);
        if(td){td.done=!td.done;openMG[gr.id]=true;renderMkt();saveMKT();}
      });
      // Delete task
      const tdel=g(`tdel-${gr.id}-${tk.id}`);
      if(tdel) tdel.addEventListener('click',e=>{
        e.stopPropagation();
        const gd=mktData.groups.find(x=>x.id===gr.id);
        if(gd){gd.tasks=gd.tasks.filter(x=>x.id!==tk.id);openMG[gr.id]=true;renderMkt();saveMKT();}
      });
    });

    // Ref delete
    (gr.refs||[]).forEach((ref,ri)=>{
      const rd=g(`refdel-${gr.id}-${ri}`);
      if(rd) rd.addEventListener('click',e=>{
        e.preventDefault();e.stopPropagation();
        const gd=mktData.groups.find(x=>x.id===gr.id);
        if(gd){gd.refs.splice(ri,1);openMG[gr.id]=true;renderMkt();saveMKT();}
      });
    });

    // Add ref
    const refbtn=g(`refadd-${gr.id}`);
    if(refbtn) refbtn.addEventListener('click',e=>{
      e.stopPropagation();
      const url=g(`refin-${gr.id}`)?.value.trim();
      const name=g(`refname-${gr.id}`)?.value.trim();
      if(!url)return;
      let type='link';
      if(url.match(/\.(pdf)$/i))type='pdf';
      else if(url.match(/\.(mp4|mov|avi|webm)$/i)||url.includes('youtube')||url.includes('vimeo'))type='video';
      else if(url.match(/\.(jpg|jpeg|png|gif|webp|heic)$/i)||url.includes('drive.google')||url.includes('dropbox'))type='img';
      const gd=mktData.groups.find(x=>x.id===gr.id);
      if(gd){
        if(!gd.refs)gd.refs=[];
        gd.refs.push({url,name:name||'',type});
        if(g(`refin-${gr.id}`))g(`refin-${gr.id}`).value='';
        if(g(`refname-${gr.id}`))g(`refname-${gr.id}`).value='';
        openMG[gr.id]=true;renderMkt();saveMKT();
      }
    });

    // Enter key on ref input
    const refin=g(`refin-${gr.id}`);
    if(refin) refin.addEventListener('keydown',e=>{if(e.key==='Enter')g(`refadd-${gr.id}`)?.click();});

    // Quick add task
    const qbtn=g(`qbtn-${gr.id}`);
    if(qbtn) qbtn.addEventListener('click',e=>{
      e.stopPropagation();
      const inp=g(`qadd-${gr.id}`),asgn=g(`qasgn-${gr.id}`);
      if(!inp?.value.trim())return;
      const gd=mktData.groups.find(x=>x.id===gr.id);
      if(gd){gd.tasks.push({id:'t'+Date.now(),txt:inp.value.trim(),done:false,assign:asgn?.value||'ale',prio:'media',due:'',sub:false});inp.value='';openMG[gr.id]=true;renderMkt();saveMKT();}
    });
    const qadd=g(`qadd-${gr.id}`);
    if(qadd) qadd.addEventListener('keydown',e=>{if(e.key==='Enter')g(`qbtn-${gr.id}`)?.click();});
  });
}

// ── NEW FC MODAL ──
g('btnFC').addEventListener('click',()=>{ g('mfcDate').value=new Date().toISOString().split('T')[0]; updateCityDrop(); g('fcModal').classList.add('on'); });
g('cancelFC').addEventListener('click',()=>g('fcModal').classList.remove('on'));
g('fcModal').addEventListener('click',e=>{ if(e.target===g('fcModal'))g('fcModal').classList.remove('on'); });
g('okFC').addEventListener('click',()=>{
  const name=g('mfcName').value.trim();
  if(!name){alert('Ingresa el nombre.');return;}
  franchises.unshift({id:'fc'+Date.now(),name,city:g('mfcCity').value,phone:g('mfcPhone').value,email:g('mfcEmail').value,stage:g('mfcStage').value,date:g('mfcDate').value,notes:'',checks:{},folios:{}});
  g('mfcName').value='';g('mfcPhone').value='';g('mfcEmail').value='';
  g('fcModal').classList.remove('on');
  renderFC();renderSidebar();saveFC();
});

// ── NEW MKT MODAL ──
g('btnMkt').addEventListener('click',()=>{ g('mmPeriod').value=mktPeriod; g('mktModal').classList.add('on'); });
g('cancelMkt').addEventListener('click',()=>g('mktModal').classList.remove('on'));
g('mktModal').addEventListener('click',e=>{ if(e.target===g('mktModal'))g('mktModal').classList.remove('on'); });
g('okMkt').addEventListener('click',()=>{
  const txt=g('mmText').value.trim(),period=g('mmPeriod').value.trim(),grpTitle=g('mmGroup').value.trim();
  if(!txt||!period||!grpTitle){alert('Completa todos los campos.');return;}
  if(!mktData.periods.includes(period))mktData.periods.push(period);
  let grp=mktData.groups.find(x=>x.period===period&&x.title===grpTitle);
  if(!grp){grp={id:'g'+Date.now(),period,title:grpTitle,emoji:'📋',cat:g('mmCat').value,tasks:[],refs:[]};mktData.groups.push(grp);}
  grp.tasks.push({id:'t'+Date.now(),txt,done:false,assign:g('mmAssign').value,prio:g('mmPrio').value,due:g('mmDue').value,sub:false});
  mktPeriod=period;openMG[grp.id]=true;
  g('mmText').value='';g('mmGroup').value='';
  g('mktModal').classList.remove('on');
  renderMkt();renderSidebar();saveMKT();
});

// ── SEARCH ──
g('fcsrch').addEventListener('input',function(){fcSearch=this.value;renderFC();});

</script>
